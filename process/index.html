<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <title>프로세스 - 운영 대시보드</title>
    <meta http-equiv="refresh" content="0; url=../">
    <script>
        location.replace('../');
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #F8FAFC; color: #1A1A1A; display: grid; place-items: center; min-height: 100vh; padding: 24px; }
        .card { background: white; border: 2px solid #E2E8F0; border-radius: 14px; padding: 22px 24px; max-width: 420px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.03); }
        h1 { font-size: 20px; font-weight: 800; color: #051C2C; margin-bottom: 8px; }
        p { font-size: 14px; color: #64748B; }
        a { color: #0077C8; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="card">
        <h1>메인으로 이동 중</h1>
        <p>자동으로 이동하지 않으면 <a href="../">여기를 누르세요</a>.</p>
    </div>
</body>
</html>
