<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <title>n8n 워크플로우 - 운영 대시보드</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #F8FAFC; color: #1A1A1A; line-height: 1.6; }
        .page { max-width: 800px; margin: 0 auto; padding: 32px 20px; }
        .back { display: inline-block; color: #64748B; text-decoration: none; font-size: 14px; margin-bottom: 24px; }
        .back:hover { color: #0077C8; }
        h1 { font-size: 24px; font-weight: 800; color: #051C2C; margin-bottom: 8px; }
        .subtitle { color: #64748B; font-size: 14px; margin-bottom: 32px; }
        .placeholder { background: white; border: 2px dashed #CBD5E1; border-radius: 12px; padding: 48px 24px; text-align: center; }
        .placeholder-icon { font-size: 48px; margin-bottom: 16px; }
        .placeholder-title { font-size: 18px; font-weight: 700; color: #475569; margin-bottom: 8px; }
        .placeholder-desc { font-size: 14px; color: #94A3B8; }
        .summary-card { background: white; border: 2px solid #FDE68A; border-radius: 14px; padding: 20px 22px; box-shadow: 0 1px 4px rgba(0,0,0,0.03); }
        .summary-eyebrow { display: inline-block; font-size: 11px; font-weight: 800; letter-spacing: .4px; color: #B45309; background: #FEF3C7; border-radius: 999px; padding: 4px 10px; margin-bottom: 10px; }
        .summary-title { font-size: 18px; font-weight: 800; color: #051C2C; margin-bottom: 6px; }
        .summary-desc { font-size: 14px; color: #64748B; margin-bottom: 12px; }
        .summary-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
        .summary-tag { font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 999px; background: #FFF7ED; color: #C2410C; }
        .summary-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: #0077C8; text-decoration: none; }
        .summary-link:hover { color: #005C99; }
        .summary-note { font-size: 12px; color: #94A3B8; margin-top: 10px; }
        .wf-list { margin-top: 32px; display: flex; flex-direction: column; gap: 12px; }
        .wf-card { background: white; border: 2px solid #E2E8F0; border-radius: 12px; padding: 18px 20px; }
        .wf-card:hover { border-color: #0077C8; }
        .wf-name { font-size: 15px; font-weight: 700; color: #051C2C; margin-bottom: 4px; }
        .wf-desc { font-size: 13px; color: #64748B; }
        .wf-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 8px; background: #E8F3FF; color: #0077C8; margin-top: 6px; }
        details.wf-cat { margin-bottom: 12px; }
        details.wf-cat summary { cursor: pointer; list-style: none; display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: #F8FAFC; border: 2px solid #E2E8F0; border-radius: 10px; font-size: 13px; font-weight: 700; color: #051C2C; transition: all 0.2s; }
        details.wf-cat summary::-webkit-details-marker { display: none; }
        details.wf-cat summary::before { content: "▸"; font-size: 12px; color: #94A3B8; transition: transform 0.2s; }
        details.wf-cat[open] summary::before { transform: rotate(90deg); }
        details.wf-cat[open] summary { border-color: #0077C8; background: #E8F3FF; margin-bottom: 8px; }
        details.wf-cat summary:hover { border-color: #0077C8; }
        .wf-cat-count { font-size: 11px; font-weight: 600; color: #94A3B8; margin-left: auto; }
    </style>
</head>
<body>
    <div class="page">
        <a href="../" class="back">&larr; 메인</a>
        <h1>⚙️ n8n 워크플로우 연결도</h1>
        <p class="subtitle">자동화 워크플로우 목록 + 연결 관계</p>

        <div class="summary-card">
            <div class="summary-eyebrow">리마인더 그룹 요약</div>
            <div class="summary-title">🔔 텔레그램 알림 흐름</div>
            <div class="summary-desc">07:00 아침 플랜, 하루 4번 리마인더, 직접 처리, 문제 알림만 한눈에 보이게 다시 정리했습니다.</div>
            <div class="summary-tags">
                <span class="summary-tag">07:00</span>
                <span class="summary-tag">하루 4번</span>
                <span class="summary-tag">직접 처리</span>
                <span class="summary-tag">문제 알림</span>
            </div>
            <a class="summary-link" href="./telegram-alerts.html">상세 프로세스 보기 <span aria-hidden="true">›</span></a>
            <div class="summary-note">CRM 신청/예약 알림과 nightwatch 시스템봇 리포트는 별도 프로세스로 분리합니다.</div>
        </div>

        <div class="wf-list" id="wf-content"><div style="text-align:center;color:#94A3B8;padding:32px">로딩 중...</div></div>
    </div>
<script>
(function() {
    var container = document.getElementById('wf-content');
    fetch('../data/workflows.json')
        .then(function(r) { if (!r.ok) throw 0; return r.json(); })
        .then(render)
        .catch(function() { container.innerHTML = '<div style="text-align:center;color:#94A3B8;padding:32px">로드 실패</div>'; });

    function render(data) {
        var wfs = data.workflows || [];
        var cats = {};
        wfs.forEach(function(w) {
            var cat = w.category || '기타';
            if (!cats[cat]) cats[cat] = [];
            cats[cat].push(w);
        });
        var html = '';
        var catOrder = ['Notion 태스크', '콘텐츠 동기화', '메모봇', 'CRM', '기타'];
        catOrder.forEach(function(cat) {
            var items = cats[cat];
            if (!items) return;
            var activeCount = items.filter(function(w) { return w.active; }).length;
            html += '<details class="wf-cat">';
            html += '<summary>' + esc(cat) + '<span class="wf-cat-count">' + activeCount + '/' + items.length + ' active</span></summary>';
            html += '<div style="display:flex;flex-direction:column;gap:8px">';
            items.forEach(function(w) {
                html += '<div class="wf-card">';
                html += '<div class="wf-name">' + (w.active ? '<span style="color:#16A34A">●</span> ' : '<span style="color:#94A3B8">○</span> ') + esc(w.name) + '</div>';
                html += '<div class="wf-desc">';
                if (w.triggers.length > 0) {
                    w.triggers.forEach(function(t) {
                        var label = t.replace('scheduleTrigger','스케줄').replace('telegramTrigger','텔레그램').replace('Trigger','');
                        html += '<span class="wf-badge">' + esc(label) + '</span> ';
                    });
                } else {
                    html += '<span class="wf-badge" style="background:#F1F5F9;color:#94A3B8">웹훅</span> ';
                }
                w.nodes.forEach(function(n) {
                    html += '<span style="font-size:11px;color:#94A3B8;margin-left:4px">' + esc(n) + '</span> ';
                });
                html += '</div></div>';
            });
            html += '</div></details>';
        });
        html += '<div style="font-size:11px;color:#94A3B8;margin-top:12px">' + fmtDate(data.updated) + ' · ' + wfs.length + '개 워크플로우</div>';
        container.innerHTML = html;
    }
    function esc(s) { var e = document.createElement('span'); e.textContent = s; return e.innerHTML; }
    function fmtDate(iso) { var d = new Date(iso); return d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
})();
</script>
<script src="../nav.js"></script>
<script src="../footer.js"></script>
<script src="../sidebar.js"></script>
</body>
</html>
