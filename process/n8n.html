<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <title>n8n 워크플로우 - 운영 대시보드</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #F8FAFC; color: #1A1A1A; line-height: 1.6; }
        .page { max-width: 800px; margin: 0 auto; padding: 32px 20px; }
        .back { display: inline-block; color: #64748B; text-decoration: none; font-size: 14px; margin-bottom: 24px; }
        .back:hover { color: #0077C8; }
        h1 { font-size: 24px; font-weight: 800; color: #051C2C; margin-bottom: 8px; }
        .subtitle { color: #64748B; font-size: 14px; margin-bottom: 32px; }
        .placeholder { background: white; border: 2px dashed #CBD5E1; border-radius: 12px; padding: 48px 24px; text-align: center; }
        .placeholder-icon { font-size: 48px; margin-bottom: 16px; }
        .placeholder-title { font-size: 18px; font-weight: 700; color: #475569; margin-bottom: 8px; }
        .placeholder-desc { font-size: 14px; color: #94A3B8; }
        .wf-list { margin-top: 32px; display: flex; flex-direction: column; gap: 12px; }
        .wf-card { background: white; border: 2px solid #E2E8F0; border-radius: 12px; padding: 18px 20px; }
        .wf-card:hover { border-color: #0077C8; }
        .wf-name { font-size: 15px; font-weight: 700; color: #051C2C; margin-bottom: 4px; }
        .wf-desc { font-size: 13px; color: #64748B; }
        .wf-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 8px; background: #E8F3FF; color: #0077C8; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="page">
        <a href="./" class="back">&larr; 프로세스 목록</a>
        <h1>⚙️ n8n 워크플로우 연결도</h1>
        <p class="subtitle">자동화 워크플로우 목록 + 연결 관계</p>

        <div class="wf-list" id="wf-content"><div style="text-align:center;color:#94A3B8;padding:32px">로딩 중...</div></div>
    </div>
<script>
(function() {
    var container = document.getElementById('wf-content');
    fetch('../data/workflows.json')
        .then(function(r) { if (!r.ok) throw 0; return r.json(); })
        .then(render)
        .catch(function() { container.innerHTML = '<div style="text-align:center;color:#94A3B8;padding:32px">로드 실패</div>'; });

    function render(data) {
        var wfs = data.workflows || [];
        var cats = {};
        wfs.forEach(function(w) {
            var cat = w.category || '기타';
            if (!cats[cat]) cats[cat] = [];
            cats[cat].push(w);
        });
        var html = '';
        var catOrder = ['Notion 태스크', '콘텐츠 동기화', '메모봇', 'CRM', '기타'];
        catOrder.forEach(function(cat) {
            var items = cats[cat];
            if (!items) return;
            html += '<div style="font-size:12px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:1px;margin:20px 0 8px">' + esc(cat) + '</div>';
            items.forEach(function(w) {
                html += '<div class="wf-card">';
                html += '<div class="wf-name">' + (w.active ? '<span style="color:#16A34A">●</span> ' : '<span style="color:#94A3B8">○</span> ') + esc(w.name) + '</div>';
                html += '<div class="wf-desc">';
                if (w.triggers.length > 0) {
                    w.triggers.forEach(function(t) {
                        var label = t.replace('scheduleTrigger','스케줄').replace('telegramTrigger','텔레그램').replace('Trigger','');
                        html += '<span class="wf-badge">' + esc(label) + '</span> ';
                    });
                } else {
                    html += '<span class="wf-badge" style="background:#F1F5F9;color:#94A3B8">웹훅</span> ';
                }
                w.nodes.forEach(function(n) {
                    html += '<span style="font-size:11px;color:#94A3B8;margin-left:4px">' + esc(n) + '</span> ';
                });
                html += '</div></div>';
            });
        });
        html += '<div style="font-size:11px;color:#94A3B8;margin-top:12px">' + fmtDate(data.updated) + ' · ' + wfs.length + '개 워크플로우</div>';
        container.innerHTML = html;
    }
    function esc(s) { var e = document.createElement('span'); e.textContent = s; return e.innerHTML; }
    function fmtDate(iso) { var d = new Date(iso); return d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
})();
</script>
    </div>
<script src="../nav.js"></script>
<script src="../footer.js"></script>
<script src="../sidebar.js"></script>
</body>
</html>
