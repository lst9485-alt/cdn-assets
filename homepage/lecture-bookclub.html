<!-- 내집마련 독서모임 — 아임웹 상품 설명용 -->

<div class="max-w-4xl mx-auto px-6 sm:px-8 py-8">

<!-- ===== 히어로 ===== -->
<section class="max-w-4xl mx-auto relative overflow-hidden rounded-3xl mx-6 sm:mx-8" style="background: linear-gradient(135deg, #1a1a3e 0%, #2d1b4e 50%, #3d2b5e 100%);">

      <span class="text-white/50">|</span>
      <span class="text-white font-bold">온라인</span>
      <span class="text-white/50">|</span>

</section>

      <div>
        <p class="font-bold text-brand-dark mb-1">혼자 책 읽기가 어려운 분</p>

    </div>
    <div class="bg-gray-50 rounded-2xl p-6 flex items-start gap-4">

    </div>
    <div class="bg-gray-50 rounded-2xl p-6 flex items-start gap-4">
      <span class="text-2xl flex-shrink-0">🤝</span>
      <div>
        <p class="font-bold text-brand-dark mb-1">같은 목표를 가진 사람들과 교류하고 싶은 분</p>

<section class="max-w-4xl mx-auto px-6 sm:px-8 py-16">

      <div>

      </div>
      <div>

      </div>
    </div>
    <div class="flex items-start gap-5">
      <div class="w-10 h-10 bg-brand-orange rounded-full flex items-center justify-center flex-shrink-0">
        <span class="text-white font-bold">4</span>
      </div>
      <div>
