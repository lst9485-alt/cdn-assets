<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메인 페이지 시안</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f3ea;
      color: #14213d;
    }
    a { color: inherit; text-decoration: none; }
    .wrap { max-width: 1160px; margin: 0 auto; padding: 56px 24px 72px; }
    .eyebrow { font-size: 13px; font-weight: 800; letter-spacing: .16em; color: #7a6f5d; }
    h1 { margin: 10px 0 12px; font-size: clamp(38px, 7vw, 76px); line-height: .98; letter-spacing: -.03em; }
    .lead { max-width: 720px; margin: 0; color: #5d667a; font-size: 17px; line-height: 1.7; word-break: keep-all; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; margin-top: 38px; }
    .card {
      min-height: 235px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px;
      background: #fffdf8;
      border: 1px solid rgba(20, 33, 61, .16);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(20, 33, 61, .08);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .card:hover { transform: translateY(-3px); border-color: #ff6b5b; box-shadow: 0 22px 60px rgba(20, 33, 61, .13); }
    .num { font-size: 13px; font-weight: 900; color: #ff6b5b; letter-spacing: .12em; }
    .title { margin-top: 10px; font-size: 28px; font-weight: 900; letter-spacing: -.02em; }
    .desc { margin-top: 10px; color: #687086; font-size: 14px; line-height: 1.55; word-break: keep-all; }
    .pages { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 22px; }
    .pages a {
      display: inline-flex;
      align-items: center;
      min-height: 31px;
      padding: 7px 10px;
      border: 1px solid rgba(20, 33, 61, .2);
      border-radius: 999px;
      background: #ffffff;
      font-size: 12px;
      font-weight: 750;
    }
    .pages a:hover { border-color: #14213d; background: #14213d; color: #fffdf8; }
    .main-link {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      color: #14213d;
      font-weight: 900;
      border-bottom: 2px solid #ff6b5b;
    }
    .dashboard-link {
      display: inline-flex;
      margin-top: 22px;
      color: #64748b;
      font-size: 14px;
      font-weight: 800;
      border-bottom: 1px solid currentColor;
    }
    .dashboard-link:hover { color: #ff6b5b; }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .wrap { padding: 38px 16px 56px; }
      .grid { grid-template-columns: 1fr; }
      .card { min-height: auto; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">HOMEPAGE DESIGN DRAFTS</div>
    <h1>메인 페이지 시안</h1>
    <p class="lead">기존 메인 페이지 시안 v2와 추가 시안 v3부터 v8까지 한 번에 확인하는 진입 화면입니다. 각 카드의 홈을 누르면 해당 시안의 메인 화면으로 들어가고, 칩을 누르면 세부 페이지로 바로 이동합니다.</p>
    <a class="dashboard-link" href="../index.html">대시보드로 돌아가기</a>
    <section class="grid" id="draftGrid" aria-label="홈페이지 시안 목록"></section>
  </main>

  <script>
    const drafts = [
      { name: "메인 페이지 시안 v2", href: "main-page-test2.html", tone: "WBF Refined", desc: "기존 절제형 브랜드 컬러 적용 방향" },
      { name: "메인 페이지 시안 v3", src: "v1", tone: "Editorial Magazine", desc: "큰 타이포와 매거진형 레이아웃 중심의 단호한 방향" },
      { name: "메인 페이지 시안 v4", src: "v2", tone: "Sticker Collage", desc: "스티커와 콜라주 감성의 친근하고 다채로운 방향" },
      { name: "메인 페이지 시안 v5", src: "v3", tone: "Data Story", desc: "차트와 데이터 위젯을 강조한 신뢰형 방향" },
      { name: "메인 페이지 시안 v6", src: "v4", tone: "Neighborhood Map", desc: "동네 지도와 로드맵 메타포를 쓰는 방향" },
      { name: "메인 페이지 시안 v7", src: "v5", tone: "Kakao Chat", desc: "대화창 흐름으로 편하게 읽히는 상담형 방향" },
      { name: "메인 페이지 시안 v8", src: "v6", tone: "Risograph Zine", desc: "포스터와 진 스타일의 강한 색감 중심 방향" }
    ];
    const pages = [
      ["main", "홈"],
      ["coaching", "1:1 코칭"],
      ["curriculum", "커리큘럼"],
      ["lecture", "올인원 강의"],
      ["bookclub", "독서모임"],
      ["refund", "환불규정"]
    ];
    const base = "woori-finance-site";
    document.getElementById("draftGrid").innerHTML = drafts.map((draft, index) => `
      <article class="card">
        <div>
          <div class="num">${String(index + 2).padStart(2, "0")}</div>
          <div class="title">${draft.name}</div>
          <div class="desc">${draft.tone}<br>${draft.desc}</div>
          <a class="main-link" href="${draft.href || `${base}/${draft.src}/main.html`}">홈 화면 보기</a>
        </div>
        <div class="pages">
          ${draft.href ? `<a href="${draft.href}">홈</a>` : pages.map(([id, label]) => `<a href="${base}/${draft.src}/${id}.html">${label}</a>`).join("")}
        </div>
      </article>
    `).join("");
  </script>
</body>
</html>
