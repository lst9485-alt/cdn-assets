<script type="text/babel" data-presets="react">

        <DCArtboard id="v1" label="Editorial Magazine" width={1280} height={2200}>
          <V1Editorial />
        </DCArtboard>
      </DCSection>
      <DCSection id="sticker" title="02 · Friendly Sticker — 포스트잇 콜라주">

          <V2Sticker />
        </DCArtboard>
      </DCSection>
      <DCSection id="data" title="03 · Data Story — 차트가 주인공, 진중한 톤">
