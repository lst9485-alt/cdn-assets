<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커리큘럼 · 우리동네재테크 · V1</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Pretendard', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  a { -webkit-tap-highlight-color: transparent; }
  h1, h2, h3 { white-space: pre-line; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 5px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../shared/design-system.js"></script>
<script src="../shared/page-content.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../shared/sections.jsx"></script>
<script type="text/babel" src="../shared/shell.jsx"></script>
<script type="text/babel" src="../shared/pages.jsx"></script>
<script type="text/babel">
  const VERSION = 'v1';
  const PAGE = 'curriculum';
  const ds = window.DS[VERSION];
  document.body.style.background = ds.bg;
  document.body.style.color = ds.ink;

  const App = () => {
    const Page = window.PageCurriculum;
    return (
      <div data-screen-label="v1 커리큘럼">
        <VersionSwitcher version={VERSION} page={PAGE} />
        <PageNav version={VERSION} page={PAGE} />
        <Page version={VERSION} />
        <PageFooter version={VERSION} />
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
