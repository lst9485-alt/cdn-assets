<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <title>매출 대시보드 - 운영 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #F8FAFC; color: #1A1A1A; line-height: 1.6; }
        .page { max-width: 800px; margin: 0 auto; padding: 32px 20px; }
        .back { display: inline-block; color: #64748B; text-decoration: none; font-size: 14px; margin-bottom: 24px; }
        .back:hover { color: #0077C8; }
        h1 { font-size: 24px; font-weight: 800; color: #051C2C; margin-bottom: 8px; }
        .subtitle { color: #64748B; font-size: 14px; margin-bottom: 32px; }
        .section { margin-bottom: 32px; }
        .section-title { font-size: 16px; font-weight: 700; color: #051C2C; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .section-title span { font-size: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .stat-card { background: white; border: 2px solid #E2E8F0; border-radius: 12px; padding: 20px; text-align: center; }
        .stat-label { font-size: 12px; color: #94A3B8; font-weight: 600; margin-bottom: 4px; }
        .stat-value { font-size: 24px; font-weight: 800; color: #051C2C; }
        .stat-sub { font-size: 11px; color: #64748B; margin-top: 2px; }
        .chart-box { background: white; border-radius: 12px; padding: 20px; border: 1px solid #E2E8F0; }
        .chart-box canvas { max-height: 260px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 10px 8px; border-bottom: 2px solid #E2E8F0; color: #64748B; font-weight: 600; font-size: 12px; }
        td { padding: 10px 8px; border-bottom: 1px solid #F1F5F9; }
        tr:hover td { background: #F8FAFC; }
        .text-right { text-align: right; }
        .badge-up { color: #059669; font-weight: 700; }
        .badge-down { color: #DC2626; font-weight: 700; }
        .updated { text-align: right; font-size: 11px; color: #94A3B8; margin-top: 24px; }
        .error-msg { text-align: center; padding: 40px; color: #94A3B8; }
        @media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr; } .stat-value { font-size: 20px; } }
    </style>
</head>
<body>
    <div class="page">
        <a href="./" class="back">&larr; 대시보드</a>
        <h1>💰 매출 대시보드</h1>
        <p class="subtitle">콘텐츠관리시트 기반 매출 현황</p>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label" id="cur-label">이번 달 매출</div>
                <div class="stat-value" id="cur-value" style="color:#94A3B8;">—</div>
                <div class="stat-sub" id="cur-sub"></div>
            </div>
            <div class="stat-card">
                <div class="stat-label" id="last-label">지난 달 매출</div>
                <div class="stat-value" id="last-value" style="color:#94A3B8;">—</div>
                <div class="stat-sub" id="last-sub"></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">전월 대비</div>
                <div class="stat-value" id="change-value" style="color:#94A3B8;">—</div>
                <div class="stat-sub">증감률</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title"><span>📈</span> 월별 매출 추이</div>
            <div class="chart-box"><canvas id="chart-monthly"></canvas></div>
        </div>

        <div class="section">
            <div class="section-title"><span>🎬</span> 유입 채널별 매출</div>
            <div class="chart-box" id="utm-table-wrap"></div>
        </div>

        <div class="section">
            <div class="section-title"><span>📊</span> 상담목적별 매출</div>
            <div class="chart-box" style="display:flex;align-items:center;gap:24px;flex-wrap:wrap;">
                <div style="width:200px;height:200px;"><canvas id="chart-purpose"></canvas></div>
                <div id="purpose-legend" style="font-size:13px;"></div>
            </div>
        </div>

        <div class="updated" id="updated"></div>
    </div>

<script src="../nav.js"></script>
<script src="../footer.js"></script>
<script src="../sidebar.js"></script>
<script>
(function() {
    const fmt = n => {
        if (n >= 10000) return Math.round(n / 10000) + '\ub9cc\uc6d0';
        if (n >= 1000) return (n / 1000).toFixed(0) + '천원';
        return n + '원';
    };
    const fmtFull = n => new Intl.NumberFormat('ko-KR').format(n) + '원';
    const monthLabel = m => {
        const [y, mo] = m.split('-');
        return (y === new Date().getFullYear().toString() ? '' : y.slice(2) + '.') + parseInt(mo) + '월';
    };

    fetch('../data/sales.json')
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(render)
        .catch(() => {
            document.querySelector('.page').innerHTML += '<div class="error-msg">매출 데이터를 불러올 수 없습니다</div>';
        });

    function render(d) {
        const s = d.summary;

        // stat cards
        const curEl = document.getElementById('cur-value');
        curEl.textContent = fmt(s.current_month);
        curEl.style.color = '#051C2C';
        document.getElementById('cur-label').textContent = s.current_month_label.replace(/^\d{4}-0?/, '') + '월 매출';
        document.getElementById('cur-sub').textContent = '누적 고객 ' + s.total_customers + '명';

        const lastEl = document.getElementById('last-value');
        lastEl.textContent = fmt(s.last_month);
        lastEl.style.color = '#051C2C';
        document.getElementById('last-label').textContent = s.last_month_label.replace(/^\d{4}-0?/, '') + '월 매출';

        const changeEl = document.getElementById('change-value');
        changeEl.textContent = s.change_pct;
        if (s.change_pct.startsWith('+')) {
            changeEl.style.color = '#059669';
        } else if (s.change_pct.startsWith('-')) {
            changeEl.style.color = '#DC2626';
        } else {
            changeEl.style.color = '#64748B';
        }

        // monthly chart
        if (d.monthly.length) {
            const ctx = document.getElementById('chart-monthly').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: d.monthly.map(m => monthLabel(m.month)),
                    datasets: [{
                        label: '매출',
                        data: d.monthly.map(m => m.revenue),
                        backgroundColor: '#0077C8',
                        borderRadius: 6,
                        barPercentage: 0.6,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => fmtFull(ctx.raw) + ' (' + d.monthly[ctx.dataIndex].customers + '명)'
                            }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { callback: v => fmt(v) },
                            grid: { color: '#F1F5F9' }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // UTM table
        if (d.by_utm.length) {
            let html = '<table><thead><tr><th>채널</th><th class="text-right">건수</th><th class="text-right">매출</th></tr></thead><tbody>';
            d.by_utm.forEach(u => {
                const label = u.utm === '(직접)' ? '직접 유입' : u.utm.replace('yt_', '영상 #');
                html += `<tr><td>${label}</td><td class="text-right">${u.count}건</td><td class="text-right">${fmt(u.revenue)}</td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('utm-table-wrap').innerHTML = html;
        }

        // purpose chart
        if (d.by_purpose.length) {
            const colors = ['#0077C8', '#059669', '#F59E0B', '#8B5CF6'];
            const ctx2 = document.getElementById('chart-purpose').getContext('2d');
            new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: d.by_purpose.map(p => p.purpose),
                    datasets: [{
                        data: d.by_purpose.map(p => p.revenue),
                        backgroundColor: colors.slice(0, d.by_purpose.length),
                        borderWidth: 0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: ctx => ctx.label + ': ' + fmtFull(ctx.raw) } }
                    },
                    cutout: '60%',
                }
            });
            let legend = '';
            d.by_purpose.forEach((p, i) => {
                legend += `<div style="margin-bottom:6px;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${colors[i]};margin-right:6px;"></span><strong>${p.purpose}</strong> ${p.ratio} (${fmt(p.revenue)})</div>`;
            });
            document.getElementById('purpose-legend').innerHTML = legend;
        }

        // updated
        if (d.updated) {
            const dt = new Date(d.updated);
            document.getElementById('updated').textContent = '마지막 업데이트: ' + dt.toLocaleString('ko-KR');
        }
    }
})();
</script>
</body>
</html>
