<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 - 운영 대시보드</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #F8FAFC; color: #1A1A1A; line-height: 1.6; }
        .page { max-width: 900px; margin: 0 auto; padding: 32px 20px; }
        .back { display: inline-block; color: #64748B; text-decoration: none; font-size: 14px; margin-bottom: 24px; }
        .back:hover { color: #0077C8; }
        h1 { font-size: 24px; font-weight: 800; color: #051C2C; margin-bottom: 24px; }

        /* ── 요약 카드 그리드 ── */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 28px; }
        .summary-card { background: white; border: 2px solid #E2E8F0; border-radius: 12px; padding: 18px 20px; }
        .summary-label { font-size: 13px; font-weight: 700; color: #64748B; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .summary-label span { font-size: 16px; }
        .summary-value { font-size: 28px; font-weight: 800; color: #051C2C; }
        .summary-sub { font-size: 13px; color: #94A3B8; margin-top: 4px; }
        .summary-bar { height: 6px; background: #E2E8F0; border-radius: 3px; overflow: hidden; margin-top: 8px; }
        .summary-bar-fill { height: 100%; background: #16A34A; border-radius: 3px; }
        .summary-warn { color: #DC2626; font-weight: 700; }
        .summary-mini { display: flex; gap: 12px; margin-top: 8px; }
        .summary-mini-item { font-size: 13px; color: #475569; }
        .summary-mini-item strong { font-weight: 700; }

        /* ── 상세 섹션 (접기/펼치기) ── */
        details { margin-bottom: 16px; }
        details summary { cursor: pointer; list-style: none; display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: white; border: 2px solid #E2E8F0; border-radius: 10px; font-size: 16px; font-weight: 700; color: #051C2C; transition: all 0.2s; }
        details summary::-webkit-details-marker { display: none; }
        details summary::before { content: "▸"; font-size: 13px; color: #94A3B8; transition: transform 0.2s; }
        details[open] summary::before { transform: rotate(90deg); }
        details[open] summary { border-color: #0077C8; background: #E8F3FF; margin-bottom: 12px; }
        details summary:hover { border-color: #0077C8; }
        details summary .badge { font-size: 12px; font-weight: 700; color: #64748B; background: #F1F5F9; padding: 2px 8px; border-radius: 8px; margin-left: auto; }

        /* ── 투두 ── */
        .todo-error { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 10px; padding: 20px; text-align: center; color: #DC2626; font-size: 15px; }
        .todo-category { background: white; border: 1px solid #E2E8F0; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
        .todo-cat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .todo-cat-id { font-size: 12px; font-weight: 700; color: white; background: #64748B; border-radius: 4px; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .todo-cat-title { font-size: 15px; font-weight: 600; color: #1E293B; }
        .todo-cat-ref { font-size: 13px; color: #94A3B8; margin-left: auto; }
        .todo-item { display: flex; align-items: flex-start; gap: 8px; padding: 4px 0; font-size: 14px; color: #475569; }
        .todo-item input[type="checkbox"] { margin-top: 3px; pointer-events: none; }
        .todo-item.done { color: #94A3B8; text-decoration: line-through; }

        /* ── 프로젝트 ── */
        .proj-card { background: white; border: 1px solid #E2E8F0; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
        .proj-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .proj-icon { font-size: 16px; flex-shrink: 0; }
        .proj-name { font-size: 15px; font-weight: 600; color: #1E293B; }
        .proj-app { font-size: 13px; color: #64748B; background: #F1F5F9; border-radius: 4px; padding: 1px 6px; margin-left: auto; flex-shrink: 0; }
        .proj-status { font-size: 14px; color: #475569; margin-bottom: 4px; }
        .proj-next { font-size: 13px; color: #0077C8; display: flex; align-items: flex-start; gap: 4px; }
        .proj-next::before { content: "→"; flex-shrink: 0; }
        .proj-error { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 10px; padding: 20px; text-align: center; color: #DC2626; font-size: 15px; }

        /* ── OKR ── */
        .okr-error { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 10px; padding: 20px; text-align: center; color: #DC2626; font-size: 15px; }
        .okr-kr { background: white; border: 1px solid #E2E8F0; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
        .okr-kr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .okr-kr-title { font-size: 15px; font-weight: 600; color: #1E293B; }
        .okr-kr-rate { font-size: 14px; font-weight: 700; color: #0077C8; }
        .okr-kr-bar { height: 8px; background: #E2E8F0; border-radius: 4px; overflow: hidden; }
        .okr-kr-fill { height: 100%; border-radius: 4px; }
        .okr-kr-detail { font-size: 13px; color: #94A3B8; margin-top: 6px; }

        .updated { font-size: 12px; color: #94A3B8; text-align: right; margin-top: 8px; }

        @media (max-width: 600px) { .summary-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="page">
        <a href="../" class="back">&larr; 메인</a>
        <h1>📊 대시보드</h1>

        <!-- 요약 카드 (스크롤 없이 한눈에) -->
        <div class="summary-grid">
            <div class="summary-card" id="summary-todo">
                <div class="summary-label"><span>✅</span> 투두리스트</div>
                <div class="summary-value">—</div>
                <div class="summary-bar"><div class="summary-bar-fill" style="width:0%"></div></div>
            </div>
            <div class="summary-card" id="summary-proj">
                <div class="summary-label"><span>📁</span> 프로젝트</div>
                <div class="summary-value">—</div>
                <div class="summary-sub">로딩 중...</div>
            </div>
            <div class="summary-card" id="summary-okr">
                <div class="summary-label"><span>🎯</span> OKR · 태스크</div>
                <div class="summary-value">—</div>
                <div class="summary-sub">로딩 중...</div>
            </div>
        </div>

        <!-- 상세: 접기/펼치기 -->
        <details id="todo-detail">
            <summary>✅ 투두리스트 <span class="badge" id="todo-badge">—</span></summary>
            <div id="todo-content"></div>
        </details>

        <details id="proj-detail">
            <summary>📁 프로젝트 리스트 <span class="badge" id="proj-badge">—</span></summary>
            <div id="projects-content"></div>
        </details>

        <details id="okr-detail">
            <summary>🎯 OKR · Key Results <span class="badge" id="okr-badge">—</span></summary>
            <div id="okr-content"></div>
        </details>
    </div>
<script>
// ── 투두 ──
(function() {
    var container = document.getElementById('todo-content');
    var summaryEl = document.getElementById('summary-todo');
    var badgeEl = document.getElementById('todo-badge');

    fetch('../data/todo.json')
        .then(function(res) { if (!res.ok) throw new Error(); return res.json(); })
        .then(function(data) { renderTodo(data); })
        .catch(function() { container.innerHTML = '<div class="todo-error">데이터 로드 실패</div>'; });

    function renderTodo(data) {
        var total = 0, done = 0;
        data.sections.forEach(function(s) {
            s.categories.forEach(function(c) {
                total += c.items.length;
                c.items.forEach(function(i) { if (i.done) done++; });
            });
        });
        var pct = total > 0 ? Math.round(done / total * 100) : 0;
        var pending = total - done;

        // 요약 카드
        summaryEl.querySelector('.summary-value').textContent = pending + '개 남음';
        summaryEl.querySelector('.summary-bar-fill').style.width = pct + '%';
        badgeEl.textContent = done + '/' + total;

        // 상세
        var html = '';
        data.sections.forEach(function(section) {
            section.categories.forEach(function(cat) {
                html += '<div class="todo-category">';
                html += '<div class="todo-cat-header">';
                html += '<span class="todo-cat-id">' + cat.id + '</span>';
                html += '<span class="todo-cat-title">' + esc(cat.title) + '</span>';
                if (cat.ref) html += '<span class="todo-cat-ref">📎 ' + esc(cat.ref) + '</span>';
                html += '</div>';
                cat.items.forEach(function(item) {
                    var cls = item.done ? 'todo-item done' : 'todo-item';
                    html += '<div class="' + cls + '"><input type="checkbox"' + (item.done ? ' checked' : '') + '><span>' + esc(item.text) + '</span></div>';
                });
                html += '</div>';
            });
        });
        var d = new Date(data.updated);
        html += '<div class="updated">업데이트: ' + d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}) + '</div>';
        container.innerHTML = html;
    }

    function esc(s) { var el = document.createElement('span'); el.textContent = s; return el.innerHTML; }
})();

// ── 프로젝트 ──
(function() {
    var container = document.getElementById('projects-content');
    var summaryEl = document.getElementById('summary-proj');
    var badgeEl = document.getElementById('proj-badge');

    fetch('../data/projects.json')
        .then(function(res) { if (!res.ok) throw new Error(); return res.json(); })
        .then(function(data) { renderProjects(data); })
        .catch(function() { container.innerHTML = '<div class="proj-error">데이터 로드 실패</div>'; });

    function renderProjects(data) {
        var projects = data.projects;
        var withApp = projects.filter(function(p) { return p.app; }).length;

        // 요약 카드
        summaryEl.querySelector('.summary-value').textContent = projects.length + '개';
        summaryEl.querySelector('.summary-sub').textContent = withApp + '개 apps 연결';
        badgeEl.textContent = projects.length + '개';

        // 상세
        var html = '';
        projects.forEach(function(p) {
            html += '<div class="proj-card"><div class="proj-header">';
            html += '<span class="proj-icon">' + (p.type === 'folder' ? '📂' : '📄') + '</span>';
            html += '<span class="proj-name">' + esc(p.name) + '</span>';
            if (p.app) html += '<span class="proj-app">' + esc(p.app) + '</span>';
            html += '</div>';
            if (p.status) html += '<div class="proj-status">' + esc(p.status) + '</div>';
            if (p.next) html += '<div class="proj-next">' + esc(p.next) + '</div>';
            html += '</div>';
        });
        var d = new Date(data.updated);
        html += '<div class="updated">업데이트: ' + d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}) + '</div>';
        container.innerHTML = html;
    }

    function esc(s) { var el = document.createElement('span'); el.textContent = s; return el.innerHTML; }
})();

// ── OKR ──
(function() {
    var container = document.getElementById('okr-content');
    var summaryEl = document.getElementById('summary-okr');
    var badgeEl = document.getElementById('okr-badge');

    fetch('../data/okr.json')
        .then(function(res) { if (!res.ok) throw new Error(); return res.json(); })
        .then(function(data) { renderOkr(data); })
        .catch(function() { container.innerHTML = '<div class="okr-error">데이터 로드 실패</div>'; });

    function renderOkr(data) {
        var t = data.tasks || {};
        var r = data.routines || {};
        var okr = data.okr || [];

        // 요약 카드
        var summaryHtml = '<div class="summary-label"><span>🎯</span> OKR · 태스크</div>';
        summaryHtml += '<div class="summary-mini">';
        summaryHtml += '<div class="summary-mini-item">태스크 <strong>' + (t.done||0) + '/' + (t.total||0) + '</strong></div>';
        summaryHtml += '<div class="summary-mini-item">루틴 <strong>' + (r.done_today||0) + '/' + (r.total||0) + '</strong></div>';
        if (t.overdue > 0) summaryHtml += '<div class="summary-mini-item summary-warn">지연 ' + t.overdue + '</div>';
        summaryHtml += '</div>';
        summaryEl.innerHTML = summaryHtml;
        badgeEl.textContent = 'KR ' + okr.length + '개';

        // 상세
        var html = '';
        okr.forEach(function(kr) {
            var pct = 0;
            if (kr.rate) { var m = kr.rate.match(/([\d.]+)/); if (m) pct = parseFloat(m[1]); }
            var color = pct >= 70 ? '#16A34A' : pct >= 40 ? '#D97706' : '#DC2626';
            html += '<div class="okr-kr"><div class="okr-kr-header">';
            html += '<span class="okr-kr-title">' + esc(kr.title) + '</span>';
            html += '<span class="okr-kr-rate">' + esc(kr.rate || '0%') + '</span>';
            html += '</div>';
            html += '<div class="okr-kr-bar"><div class="okr-kr-fill" style="width:' + Math.min(pct,100) + '%;background:' + color + '"></div></div>';
            if (kr.target != null && kr.current != null) html += '<div class="okr-kr-detail">현재 ' + kr.current + ' / 목표 ' + kr.target + '</div>';
            html += '</div>';
        });
        var d = new Date(data.updated);
        html += '<div class="updated">업데이트: ' + d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}) + '</div>';
        container.innerHTML = html;
    }

    function esc(s) { var el = document.createElement('span'); el.textContent = s; return el.innerHTML; }
})();
</script>
<script src="../nav.js"></script>
<script src="../sidebar.js"></script>
</body>
</html>
