<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <title>대시보드 - 운영 대시보드</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #F8FAFC; color: #1E293B; line-height: 1.6; }
        .page { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }
        .back { display: inline-block; color: #64748B; text-decoration: none; font-size: 14px; margin-bottom: 16px; }
        .back:hover { color: #0077C8; }
        h1 { font-size: 22px; font-weight: 800; color: #051C2C; margin-bottom: 20px; }

        /* ── 3열 레이아웃 ── */
        .columns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; align-items: start; }
        .column { background: white; border: 1px solid #E2E8F0; border-radius: 12px; padding: 20px; max-height: calc(100vh - 140px); overflow-y: auto; }
        .column::-webkit-scrollbar { width: 4px; }
        .column::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 2px; }
        .col-header { font-size: 15px; font-weight: 700; color: #051C2C; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
        .col-header .count { font-size: 13px; font-weight: 600; color: #64748B; }

        /* ── 공용 ── */
        .progress-bar { height: 4px; background: #E2E8F0; border-radius: 2px; overflow: hidden; margin-bottom: 14px; }
        .progress-fill { height: 100%; background: #0077C8; border-radius: 2px; }
        .updated { font-size: 11px; color: #94A3B8; margin-top: 12px; }
        .error { background: #F8FAFC; border: 1px dashed #CBD5E1; border-radius: 8px; padding: 16px; text-align: center; color: #94A3B8; font-size: 14px; }

        /* ── 접기/펼치기 공용 ── */
        .fold { margin-bottom: 8px; }
        .fold summary { cursor: pointer; list-style: none; display: flex; align-items: center; gap: 6px; padding: 8px 10px; background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 8px; font-size: 14px; font-weight: 600; color: #1E293B; transition: all 0.15s; }
        .fold summary::-webkit-details-marker { display: none; }
        .fold summary::before { content: "▸"; font-size: 11px; color: #94A3B8; transition: transform 0.15s; }
        .fold[open] summary::before { transform: rotate(90deg); }
        .fold[open] summary { background: #E8F3FF; border-color: #0077C8; }
        .fold summary:hover { border-color: #0077C8; }
        .fold-body { padding: 8px 10px 4px; }
        .fold summary .fold-count { font-size: 12px; color: #94A3B8; margin-left: auto; }

        /* ── 투두 ── */
        .todo-num { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; background: #0077C8; color: white; border-radius: 4px; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-right: 4px; }
        .todo-item { display: flex; align-items: flex-start; gap: 6px; padding: 3px 0; font-size: 14px; color: #475569; }
        .todo-item input { margin-top: 4px; pointer-events: none; accent-color: #0077C8; }
        .todo-item.done { color: #B0B8C4; text-decoration: line-through; }

        /* ── 프로젝트 ── */
        .proj-icon { flex-shrink: 0; font-size: 14px; }
        .proj-app { font-size: 12px; color: #64748B; }
        .proj-status { font-size: 13px; color: #64748B; padding: 2px 0; }
        .proj-next { font-size: 13px; color: #0077C8; }

        /* ── OKR ── */
        .okr-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
        .okr-stat { background: #F8FAFC; border-radius: 8px; padding: 12px; text-align: center; }
        .okr-stat-label { font-size: 12px; color: #64748B; }
        .okr-stat-value { font-size: 22px; font-weight: 800; color: #051C2C; }
        .okr-stat-sub { font-size: 12px; color: #94A3B8; }
        .okr-stat-warn { color: #DC2626; }
        .okr-kr { margin-bottom: 12px; }
        .okr-kr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .okr-kr-title { font-size: 14px; font-weight: 600; color: #1E293B; }
        .okr-kr-rate { font-size: 13px; font-weight: 700; color: #0077C8; }
        .okr-kr-bar { height: 6px; background: #E2E8F0; border-radius: 3px; overflow: hidden; }
        .okr-kr-fill { height: 100%; background: #0077C8; border-radius: 3px; }
        .okr-kr-detail { font-size: 12px; color: #94A3B8; margin-top: 3px; }

        @media (max-width: 900px) { .columns { grid-template-columns: 1fr; } .column { max-height: none; } }
    </style>
</head>
<body>
    <div class="page">
        <a href="../" class="back">&larr; 메인</a>
        <h1>📊 대시보드</h1>

        <div class="columns">
            <!-- 투두리스트 -->
            <div class="column" id="col-todo">
                <div class="col-header">✅ 투두리스트 <span class="count" id="todo-count">—</span></div>
                <div id="todo-content"><div class="error">로딩 중...</div></div>
            </div>

            <!-- 프로젝트 -->
            <div class="column" id="col-proj">
                <div class="col-header">📁 프로젝트 <span class="count" id="proj-count">—</span></div>
                <div id="projects-content"><div class="error">로딩 중...</div></div>
            </div>

            <!-- OKR -->
            <div class="column" id="col-okr">
                <div class="col-header">🎯 OKR · 태스크 <span class="count" id="okr-count">—</span></div>
                <div id="okr-content"><div class="error">로딩 중...</div></div>
            </div>
        </div>
    </div>
<script>
// ── 투두 ──
(function() {
    var container = document.getElementById('todo-content');
    var countEl = document.getElementById('todo-count');

    fetch('../data/todo.json')
        .then(function(r) { if (!r.ok) throw 0; return r.json(); })
        .then(render).catch(function() { container.innerHTML = '<div class="error">로드 실패</div>'; });

    function render(data) {
        var total = 0, done = 0;
        data.sections.forEach(function(s) { s.categories.forEach(function(c) {
            total += c.items.length; c.items.forEach(function(i) { if (i.done) done++; });
        }); });
        var pct = total > 0 ? Math.round(done / total * 100) : 0;
        countEl.textContent = (total - done) + '개 남음';

        var html = '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
        data.sections.forEach(function(s) { s.categories.forEach(function(cat) {
            var catDone = cat.items.filter(function(i){return i.done;}).length;
            var catPending = cat.items.length - catDone;
            html += '<details class="fold"><summary><span class="todo-num">' + cat.id + '</span>' + esc(cat.title) + '<span class="fold-count">' + catPending + '개</span></summary><div class="fold-body">';
            cat.items.forEach(function(item) {
                html += '<div class="todo-item' + (item.done ? ' done' : '') + '"><input type="checkbox"' + (item.done ? ' checked' : '') + '><span>' + esc(item.text) + '</span></div>';
            });
            html += '</div></details>';
        }); });
        html += '<div class="updated">' + fmtDate(data.updated) + '</div>';
        container.innerHTML = html;
    }
    function esc(s) { var e = document.createElement('span'); e.textContent = s; return e.innerHTML; }
    function fmtDate(iso) { var d = new Date(iso); return d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
})();

// ── 프로젝트 ──
(function() {
    var container = document.getElementById('projects-content');
    var countEl = document.getElementById('proj-count');

    fetch('../data/projects.json')
        .then(function(r) { if (!r.ok) throw 0; return r.json(); })
        .then(render).catch(function() { container.innerHTML = '<div class="error">로드 실패</div>'; });

    function render(data) {
        var p = data.projects;
        countEl.textContent = p.length + '개 진행 중';
        var html = '';
        p.forEach(function(proj) {
            var folderSvg = '<svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:-2px"><path d="M1 3.5A1.5 1.5 0 012.5 2h3.172a1.5 1.5 0 011.06.44L7.94 3.644a.5.5 0 00.354.147H13.5A1.5 1.5 0 0115 5.29V12.5A1.5 1.5 0 0113.5 14h-11A1.5 1.5 0 011 12.5z" fill="#F59E0B"/></svg>';
            var fileSvg = '<svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:-2px"><rect x="3" y="1" width="10" height="14" rx="1.5" fill="#E2E8F0"/><rect x="5" y="4" width="6" height="1" rx=".5" fill="#94A3B8"/><rect x="5" y="6.5" width="6" height="1" rx=".5" fill="#94A3B8"/><rect x="5" y="9" width="4" height="1" rx=".5" fill="#94A3B8"/></svg>';
            var icon = proj.type === 'folder' ? folderSvg : fileSvg;
            var hasDetail = proj.status || proj.next;
            if (hasDetail) {
                html += '<details class="fold"><summary><span class="proj-icon">' + icon + '</span> ' + esc(proj.name);
                if (proj.app) html += ' <span class="proj-app">' + esc(proj.app) + '</span>';
                html += '</summary><div class="fold-body">';
                if (proj.status) html += '<div class="proj-status">' + esc(proj.status) + '</div>';
                if (proj.next) html += '<div class="proj-next">→ ' + esc(proj.next) + '</div>';
                html += '</div></details>';
            } else {
                html += '<details class="fold"><summary><span class="proj-icon">' + icon + '</span> ' + esc(proj.name);
                if (proj.app) html += ' <span class="proj-app">' + esc(proj.app) + '</span>';
                html += '</summary></details>';
            }
        });
        html += '<div class="updated">' + fmtDate(data.updated) + '</div>';
        container.innerHTML = html;
    }
    function esc(s) { var e = document.createElement('span'); e.textContent = s; return e.innerHTML; }
    function fmtDate(iso) { var d = new Date(iso); return d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
})();

// ── OKR ──
(function() {
    var container = document.getElementById('okr-content');
    var countEl = document.getElementById('okr-count');

    fetch('../data/okr.json')
        .then(function(r) { if (!r.ok) throw 0; return r.json(); })
        .then(render).catch(function() { container.innerHTML = '<div class="error">로드 실패</div>'; });

    function render(data) {
        var t = data.tasks || {}, r = data.routines || {}, okr = data.okr || [];
        countEl.textContent = 'KR ' + okr.length + '개';

        var pending = (t.total||0) - (t.done||0);
        var html = '';

        // 미완료 태스크
        html += '<div class="okr-stat" style="margin-bottom:12px;text-align:left"><div class="okr-stat-label">미완료 태스크 <strong>' + pending + '개</strong>';
        if (t.overdue > 0) html += ' · <span class="okr-stat-warn">지연 ' + t.overdue + '</span>';
        html += '</div></div>';

        // 오늘 루틴 체크리스트
        html += '<div style="margin-bottom:16px">';
        html += '<div style="font-size:13px;font-weight:700;color:#475569;margin-bottom:6px">오늘 루틴</div>';
        var items = r.items || [];
        items.forEach(function(item) {
            var cls = item.done ? 'todo-item done' : 'todo-item';
            html += '<div class="' + cls + '"><input type="checkbox"' + (item.done ? ' checked' : '') + '><span>' + esc(item.name) + '</span></div>';
        });
        html += '</div>';

        // OKR Key Results — 별도 박스
        if (okr.length > 0) {
            html += '<div style="background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:12px;margin-bottom:8px">';
            html += '<div style="font-size:13px;font-weight:700;color:#475569;margin-bottom:8px">OKR Key Results</div>';
            okr.forEach(function(kr) {
                var pct = 0;
                if (kr.rate) { var m = kr.rate.match(/([\d.]+)/); if (m) pct = parseFloat(m[1]); }
                html += '<div class="okr-kr"><div class="okr-kr-header"><span class="okr-kr-title">' + esc(kr.title) + '</span><span class="okr-kr-rate">' + esc(kr.rate||'0%') + '</span></div>';
                html += '<div class="okr-kr-bar"><div class="okr-kr-fill" style="width:' + Math.min(pct,100) + '%"></div></div>';
                if (kr.target != null && kr.current != null) html += '<div class="okr-kr-detail">현재 ' + kr.current + ' / 목표 ' + kr.target + '</div>';
                html += '</div>';
            });
            html += '</div>';
        }
        html += '<div class="updated">' + fmtDate(data.updated) + '</div>';
        container.innerHTML = html;
    }
    function esc(s) { var e = document.createElement('span'); e.textContent = s; return e.innerHTML; }
    function fmtDate(iso) { var d = new Date(iso); return d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
})();
</script>
<script src="../nav.js"></script>
<script src="../sidebar.js"></script>
</body>
</html>
