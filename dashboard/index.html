<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 - 운영 대시보드</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #F8FAFC; color: #1A1A1A; line-height: 1.6; }
        .page { max-width: 800px; margin: 0 auto; padding: 32px 20px; }
        .back { display: inline-block; color: #64748B; text-decoration: none; font-size: 14px; margin-bottom: 24px; }
        .back:hover { color: #0077C8; }
        h1 { font-size: 24px; font-weight: 800; color: #051C2C; margin-bottom: 32px; }
        .section { margin-bottom: 32px; }
        .section-title { font-size: 16px; font-weight: 700; color: #051C2C; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .section-title span { font-size: 20px; }
        .placeholder { background: white; border: 2px dashed #CBD5E1; border-radius: 12px; padding: 40px 24px; text-align: center; }
        .placeholder-title { font-size: 15px; font-weight: 700; color: #475569; margin-bottom: 6px; }
        .placeholder-desc { font-size: 13px; color: #94A3B8; }
        .badge-soon { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: #FEF3C7; color: #D97706; margin-left: 8px; }
        .badge-live { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: #DCFCE7; color: #16A34A; margin-left: 8px; }
        .todo-error { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 12px; padding: 24px; text-align: center; color: #DC2626; font-size: 14px; }
        .todo-section-name { font-size: 14px; font-weight: 700; color: #334155; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #E2E8F0; }
        .todo-category { background: white; border: 1px solid #E2E8F0; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
        .todo-cat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .todo-cat-id { font-size: 12px; font-weight: 700; color: white; background: #64748B; border-radius: 4px; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .todo-cat-title { font-size: 14px; font-weight: 600; color: #1E293B; }
        .todo-cat-ref { font-size: 12px; color: #94A3B8; margin-left: auto; }
        .todo-item { display: flex; align-items: flex-start; gap: 8px; padding: 4px 0; font-size: 13px; color: #475569; }
        .todo-item input[type="checkbox"] { margin-top: 3px; pointer-events: none; }
        .todo-item.done { color: #94A3B8; text-decoration: line-through; }
        .todo-progress { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 13px; color: #64748B; }
        .todo-progress-bar { flex: 1; height: 6px; background: #E2E8F0; border-radius: 3px; overflow: hidden; }
        .todo-progress-fill { height: 100%; background: #16A34A; border-radius: 3px; transition: width 0.3s; }
        .todo-updated { font-size: 11px; color: #94A3B8; text-align: right; margin-top: 8px; }
        .proj-card { background: white; border: 1px solid #E2E8F0; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
        .proj-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .proj-icon { font-size: 16px; flex-shrink: 0; }
        .proj-name { font-size: 14px; font-weight: 600; color: #1E293B; }
        .proj-app { font-size: 12px; color: #64748B; background: #F1F5F9; border-radius: 4px; padding: 1px 6px; margin-left: auto; flex-shrink: 0; }
        .proj-status { font-size: 13px; color: #475569; margin-bottom: 4px; }
        .proj-next { font-size: 12px; color: #0077C8; display: flex; align-items: flex-start; gap: 4px; }
        .proj-next::before { content: "→"; flex-shrink: 0; }
        .proj-count { font-size: 13px; color: #64748B; margin-bottom: 12px; }
        .proj-error { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 12px; padding: 24px; text-align: center; color: #DC2626; font-size: 14px; }
        .proj-updated { font-size: 11px; color: #94A3B8; text-align: right; margin-top: 8px; }
        .okr-error { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 12px; padding: 24px; text-align: center; color: #DC2626; font-size: 14px; }
        .okr-updated { font-size: 11px; color: #94A3B8; text-align: right; margin-top: 8px; }
        .okr-cards { display: flex; gap: 10px; margin-bottom: 12px; }
        .okr-stat-card { flex: 1; background: white; border: 1px solid #E2E8F0; border-radius: 10px; padding: 14px 16px; text-align: center; }
        .okr-stat-label { font-size: 12px; color: #64748B; margin-bottom: 4px; }
        .okr-stat-value { font-size: 22px; font-weight: 800; color: #1E293B; }
        .okr-stat-sub { font-size: 11px; color: #94A3B8; margin-top: 2px; }
        .okr-stat-card.overdue .okr-stat-value { color: #DC2626; }
        .okr-kr { background: white; border: 1px solid #E2E8F0; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
        .okr-kr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .okr-kr-title { font-size: 14px; font-weight: 600; color: #1E293B; }
        .okr-kr-rate { font-size: 13px; font-weight: 700; color: #0077C8; }
        .okr-kr-bar { height: 8px; background: #E2E8F0; border-radius: 4px; overflow: hidden; }
        .okr-kr-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
        .okr-kr-detail { font-size: 12px; color: #94A3B8; margin-top: 6px; }
        .okr-subtitle { font-size: 13px; font-weight: 700; color: #475569; margin: 16px 0 8px; }
    </style>
</head>
<body>
    <div class="page">
        <a href="../" class="back">&larr; 메인</a>
        <h1>📊 대시보드</h1>

        <div id="todo" class="section">
            <div class="section-title"><span>✅</span> 투두리스트 <span class="badge-live">LIVE</span></div>
            <div id="todo-content">
                <div class="placeholder">
                    <div class="placeholder-desc">로딩 중...</div>
                </div>
            </div>
        </div>

        <div id="projects" class="section">
            <div class="section-title"><span>📁</span> 프로젝트 리스트 <span class="badge-live">LIVE</span></div>
            <div id="projects-content">
                <div class="placeholder">
                    <div class="placeholder-desc">로딩 중...</div>
                </div>
            </div>
        </div>

        <div id="okr" class="section">
            <div class="section-title"><span>🎯</span> OKR · 루틴 · 태스크 <span class="badge-live">LIVE</span></div>
            <div id="okr-content">
                <div class="placeholder">
                    <div class="placeholder-desc">로딩 중...</div>
                </div>
            </div>
        </div>
    </div>
<script>
(function() {
    var container = document.getElementById('todo-content');

    fetch('../data/todo.json')
        .then(function(res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        })
        .then(function(data) { renderTodo(data); })
        .catch(function() {
            container.innerHTML = '<div class="todo-error">데이터 로드 실패 — 크론잡 실행 후 다시 확인</div>';
        });

    function renderTodo(data) {
        var totalItems = 0, totalDone = 0;
        data.sections.forEach(function(s) {
            s.categories.forEach(function(c) {
                totalItems += c.items.length;
                c.items.forEach(function(i) { if (i.done) totalDone++; });
            });
        });

        var pct = totalItems > 0 ? Math.round(totalDone / totalItems * 100) : 0;
        var html = '';

        // 진행률 바
        html += '<div class="todo-progress">';
        html += '<div class="todo-progress-bar"><div class="todo-progress-fill" style="width:' + pct + '%"></div></div>';
        html += '<span>' + totalDone + '/' + totalItems + ' (' + pct + '%)</span>';
        html += '</div>';

        data.sections.forEach(function(section) {
            html += '<div class="todo-section-name">' + esc(section.name) + '</div>';
            section.categories.forEach(function(cat) {
                html += '<div class="todo-category">';
                html += '<div class="todo-cat-header">';
                html += '<span class="todo-cat-id">' + cat.id + '</span>';
                html += '<span class="todo-cat-title">' + esc(cat.title) + '</span>';
                if (cat.ref) html += '<span class="todo-cat-ref">📎 ' + esc(cat.ref) + '</span>';
                html += '</div>';
                cat.items.forEach(function(item) {
                    var cls = item.done ? 'todo-item done' : 'todo-item';
                    html += '<div class="' + cls + '">';
                    html += '<input type="checkbox"' + (item.done ? ' checked' : '') + '>';
                    html += '<span>' + esc(item.text) + '</span>';
                    html += '</div>';
                });
                html += '</div>';
            });
        });

        // 업데이트 시간
        var d = new Date(data.updated);
        html += '<div class="todo-updated">업데이트: ' + d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}) + '</div>';

        container.innerHTML = html;
    }

    function esc(s) {
        var el = document.createElement('span');
        el.textContent = s;
        return el.innerHTML;
    }
})();
</script>
<script>
(function() {
    var container = document.getElementById('projects-content');

    fetch('../data/projects.json')
        .then(function(res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        })
        .then(function(data) { renderProjects(data); })
        .catch(function() {
            container.innerHTML = '<div class="proj-error">데이터 로드 실패 — 크론잡 실행 후 다시 확인</div>';
        });

    function renderProjects(data) {
        var projects = data.projects;
        var html = '';

        html += '<div class="proj-count">진행 중 ' + projects.length + '개</div>';

        projects.forEach(function(p) {
            html += '<div class="proj-card">';
            html += '<div class="proj-header">';
            html += '<span class="proj-icon">' + (p.type === 'folder' ? '📂' : '📄') + '</span>';
            html += '<span class="proj-name">' + esc(p.name) + '</span>';
            if (p.app) html += '<span class="proj-app">' + esc(p.app) + '</span>';
            html += '</div>';
            if (p.status) html += '<div class="proj-status">' + esc(p.status) + '</div>';
            if (p.next) html += '<div class="proj-next">' + esc(p.next) + '</div>';
            html += '</div>';
        });

        var d = new Date(data.updated);
        html += '<div class="proj-updated">업데이트: ' + d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}) + '</div>';

        container.innerHTML = html;
    }

    function esc(s) {
        var el = document.createElement('span');
        el.textContent = s;
        return el.innerHTML;
    }
})();
</script>
<script>
(function() {
    var container = document.getElementById('okr-content');

    fetch('../data/okr.json')
        .then(function(res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        })
        .then(function(data) { renderOkr(data); })
        .catch(function() {
            container.innerHTML = '<div class="okr-error">데이터 로드 실패 — 크론잡 실행 후 다시 확인</div>';
        });

    function renderOkr(data) {
        var html = '';

        // 태스크 + 루틴 카드
        var t = data.tasks || {};
        var r = data.routines || {};
        html += '<div class="okr-cards">';

        // 태스크 카드
        html += '<div class="okr-stat-card' + (t.overdue > 0 ? ' overdue' : '') + '">';
        html += '<div class="okr-stat-label">태스크</div>';
        html += '<div class="okr-stat-value">' + (t.done || 0) + '/' + (t.total || 0) + '</div>';
        if (t.overdue > 0) html += '<div class="okr-stat-sub">지연 ' + t.overdue + '건</div>';
        html += '</div>';

        // 루틴 카드
        html += '<div class="okr-stat-card">';
        html += '<div class="okr-stat-label">오늘 루틴</div>';
        html += '<div class="okr-stat-value">' + (r.done_today || 0) + '/' + (r.total || 0) + '</div>';
        html += '</div>';

        html += '</div>';

        // OKR Key Results
        var okr = data.okr || [];
        if (okr.length > 0) {
            html += '<div class="okr-subtitle">Key Results (' + okr.length + ')</div>';
            okr.forEach(function(kr) {
                var pct = 0;
                if (kr.rate) {
                    var m = kr.rate.match(/([\d.]+)/);
                    if (m) pct = parseFloat(m[1]);
                }
                var color = pct >= 70 ? '#16A34A' : pct >= 40 ? '#D97706' : '#DC2626';

                html += '<div class="okr-kr">';
                html += '<div class="okr-kr-header">';
                html += '<span class="okr-kr-title">' + esc(kr.title) + '</span>';
                html += '<span class="okr-kr-rate">' + esc(kr.rate || '0%') + '</span>';
                html += '</div>';
                html += '<div class="okr-kr-bar"><div class="okr-kr-fill" style="width:' + Math.min(pct, 100) + '%;background:' + color + '"></div></div>';
                if (kr.target != null && kr.current != null) {
                    html += '<div class="okr-kr-detail">현재 ' + kr.current + ' / 목표 ' + kr.target + '</div>';
                }
                html += '</div>';
            });
        }

        // 업데이트 시간
        var d = new Date(data.updated);
        html += '<div class="okr-updated">업데이트: ' + d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}) + '</div>';

        container.innerHTML = html;
    }

    function esc(s) {
        var el = document.createElement('span');
        el.textContent = s;
        return el.innerHTML;
    }
})();
</script>
<script src="../nav.js"></script>
<script src="../sidebar.js"></script>
</body>
</html>
