<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <title>사업현황 - 운영 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #F8FAFC; color: #1A1A1A; line-height: 1.6; }
        .page { max-width: 800px; margin: 0 auto; padding: 32px 20px 64px; }
        .back { display: inline-block; color: #64748B; text-decoration: none; font-size: 14px; margin-bottom: 24px; }
        .back:hover { color: #0077C8; }
        h1 { font-size: 24px; font-weight: 800; color: #051C2C; margin-bottom: 4px; }
        .subtitle { color: #64748B; font-size: 14px; margin-bottom: 20px; }
        .section { margin-bottom: 32px; }
        .section-title { font-size: 16px; font-weight: 700; color: #051C2C; margin-bottom: 16px; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .section-title-tight { margin-bottom: 0; }
        .section-subtitle { font-size: 13px; color: #64748B; }

        /* ── 탭 ── */
        .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 2px solid #E2E8F0; }
        .tab { font-size: 14px; font-weight: 700; padding: 10px 20px; color: #94A3B8; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
        .tab:hover { color: #051C2C; }
        .tab.active { color: #0077C8; border-bottom-color: #0077C8; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ── 핵심 숫자 카드 ── */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
        .stat-card { background: white; border: 2px solid #E2E8F0; border-radius: 12px; padding: 16px; text-align: center; transition: border-color 0.3s; }
        .stat-card.worst { border-color: #DC2626; }
        .stat-label { font-size: 11px; color: #94A3B8; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.5px; }
        .stat-value { font-size: 22px; font-weight: 800; color: #051C2C; }
        .stat-change { font-size: 12px; font-weight: 700; margin-top: 2px; }
        .stat-change.up { color: #059669; }
        .stat-change.down { color: #DC2626; }
        .stat-change.flat { color: #94A3B8; }

        /* ── 세로 퍼널 ── */
        .funnel { background: white; border-radius: 12px; padding: 24px; border: 1px solid #E2E8F0; }
        .funnel-layout { display: flex; gap: 16px; flex-wrap: wrap; }
        .funnel-main { flex: 1; min-width: 0; }
        .funnel-side { flex: 0 0 220px; display: flex; flex-direction: column; gap: 16px; }
        .side-card { background: white; border: 1px solid #E2E8F0; border-radius: 12px; padding: 24px; }
        .sim-title { font-size: 12px; font-weight: 700; color: #94A3B8; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 10px; }
        .sim-result { background: #F8FAFC; border-radius: 10px; border: 1px solid #E2E8F0; padding: 12px 16px; margin-bottom: 14px; }
        .sim-result-label { font-size: 13px; color: #64748B; font-weight: 600; margin-bottom: 2px; }
        .sim-revenue-row { display: flex; align-items: baseline; gap: 4px; white-space: nowrap; }
        .sim-revenue-input { width: 100%; border: none; outline: none; font-size: 22px; font-weight: 800; color: #051C2C; background: transparent; padding: 0; box-sizing: border-box; cursor: text; border-bottom: 2px solid transparent; }
        .sim-revenue-input:hover { border-bottom-color: #CBD5E1; }
        .sim-revenue-input:focus { color: #0077C8; border-bottom-color: #0077C8; }
        .sim-revenue-unit { font-size: 16px; font-weight: 700; color: #64748B; flex-shrink: 0; }
        .sim-sub-item { font-size: 13px; font-weight: 600; color: #64748B; margin-top: 4px; }
        .sim-arrow { text-align: center; color: #CBD5E1; font-size: 14px; padding: 2px 0; }
        .sim-computed { font-size: 12px; color: #94A3B8; margin-top: 3px; }
        .sim-field-input { padding: 6px 10px; font-size: 14px; }
        .sim-field { margin-bottom: 10px; }
        .sim-field-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .sim-field-label { font-size: 12px; color: #64748B; }
        .sim-hint { font-size: 11px; color: #94A3B8; }
        .sim-field-input { width: 100%; padding: 4px 8px; border: 1px solid #E2E8F0; border-radius: 6px; font-size: 12px; font-weight: 600; color: #1E293B; box-sizing: border-box; outline: none; background: #F8FAFC; }
        .sim-field-input:focus { border-color: #0077C8; background: white; }
        .funnel-stage { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: #F8FAFC; border-radius: 10px; border: 1px solid #E2E8F0; }
        .funnel-stage-left {}
        .funnel-stage-label { font-size: 14px; color: #64748B; font-weight: 600; margin-bottom: 2px; }
        .funnel-stage-value { font-size: 32px; font-weight: 800; color: #051C2C; }
        .funnel-stage-sub { font-size: 14px; color: #64748B; font-weight: 600; }
        .funnel-stage-right { text-align: right; }
        .funnel-stage-target { font-size: 12px; color: #94A3B8; }
        .progress-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .funnel-bar { height: 6px; border-radius: 3px; background: #E2E8F0; margin-top: 8px; overflow: hidden; position: relative; cursor: default; }
        .funnel-bar-progress { flex: 1; margin-top: 0; }
        .funnel-bar[title]:hover::after { content: attr(title); position: absolute; top: -28px; left: 50%; transform: translateX(-50%); background: #1A1A1A; color: white; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px; white-space: nowrap; z-index: 10; }
        .funnel-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
        .funnel-bar-fill.green { background: #059669; }
        .funnel-bar-fill.yellow { background: #F59E0B; }
        .funnel-bar-fill.red { background: #DC2626; }
        .signal-dot { font-size: 12px; margin-right: 6px; line-height: 1; }
        .progress-pct { font-size: 13px; font-weight: 800; min-width: 36px; text-align: right; }

        .funnel-connector { display: flex; align-items: center; justify-content: center; padding: 8px 0; gap: 10px; }
        .funnel-arrow { color: #CBD5E1; font-size: 20px; }
        .funnel-rate-badge { font-size: 16px; font-weight: 800; padding: 6px 16px; border-radius: 20px; white-space: nowrap; }
        .funnel-rate-badge.green { color: #059669; background: #ECFDF5; }
        .funnel-rate-badge.yellow { color: #D97706; background: #FFFBEB; }
        .funnel-rate-badge.red { color: #DC2626; background: #FEF2F2; }
        .funnel-rate-badge.bottleneck { animation: pulse-glow 2s infinite; }
        .funnel-rate-target { font-size: 11px; color: #94A3B8; margin-left: 6px; }
        .bottleneck-label { font-size: 12px; font-weight: 800; color: #DC2626; background: #FEF2F2; padding: 2px 8px; border-radius: 4px; margin-left: 6px; }
        .bottleneck-label.worst { background: #DC2626; color: white; }

        /* ── 주차 선택 ── */
        .week-select { font-size: 13px; font-weight: 600; padding: 6px 12px; border: 1px solid #E2E8F0; border-radius: 8px; background: white; color: #051C2C; cursor: pointer; margin-bottom: 16px; }
        .week-select:focus { outline: none; border-color: #0077C8; }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(220,38,38,0); }
        }

        /* ── 차트 ── */
        .chart-box { background: white; border-radius: 12px; padding: 20px; border: 1px solid #E2E8F0; }
        .chart-box canvas { max-height: 280px; }
        .chart-meta { font-size: 12px; color: #64748B; margin-bottom: 12px; }
        .chart-toggle { display: flex; gap: 6px; margin-bottom: 12px; }
        .chart-toggle-inline { margin-bottom: 0; }
        .chart-toggle button { font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: 20px; border: 1px solid #E2E8F0; background: white; color: #64748B; cursor: pointer; transition: all 0.15s; }
        .chart-toggle button.active { background: #051C2C; color: white; border-color: #051C2C; }
        .chart-toggle button:hover:not(.active) { border-color: #94A3B8; }

        /* ── 테이블 ── */
        .content-group { background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 10px; padding: 16px 18px; margin-bottom: 14px; }
        .content-group:last-child { margin-bottom: 0; }
        .content-group-title { font-size: 14px; font-weight: 800; color: #051C2C; margin-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 8px; border-bottom: 2px solid #E2E8F0; color: #64748B; font-weight: 600; font-size: 12px; }
        td { padding: 8px; border-bottom: 1px solid #F1F5F9; }
        tr:hover td { background: #F8FAFC; }
        .text-right { text-align: right; }
        .badge-up { color: #059669; font-weight: 700; }
        .badge-down { color: #DC2626; font-weight: 700; }
        .rank-title { font-size: 13px; font-weight: 800; color: #051C2C; margin-bottom: 10px; }
        .rank-empty { font-size: 12px; color: #94A3B8; }
        .rank-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #F1F5F9; font-size: 12px; }
        .rank-index { font-weight: 800; }
        .rank-label { flex: 1; font-weight: 600; color: #051C2C; }
        .rank-value { font-weight: 700; }

        /* ── 매출 탭 ── */
        .sales-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .stat-value-lg { font-size: 24px; }
        .analysis-grid { display: flex; gap: 32px; flex-wrap: wrap; }
        .analysis-panel { flex: 1; min-width: 200px; }
        .analysis-label { font-size: 13px; font-weight: 700; color: #64748B; margin-bottom: 12px; }
        .legend-layout { display: flex; align-items: center; gap: 16px; }
        .legend-chart { width: 120px; height: 120px; flex-shrink: 0; }
        .legend-text { font-size: 12px; }
        .legend-item { margin-bottom: 6px; }
        .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }

        /* ── 기타 ── */
        .updated { text-align: right; font-size: 11px; color: #94A3B8; margin-top: 24px; }
        .error-msg { text-align: center; padding: 40px; color: #94A3B8; }

        /* ── 반응형 ── */
        @media (max-width: 900px) {
            .funnel-side { flex: 1 0 100%; }
        }
        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .stat-value { font-size: 18px; }
            .funnel-stage-value { font-size: 26px; }
            .sales-stats { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .stat-value { font-size: 16px; }
            .funnel-stage-value { font-size: 22px; }
            .funnel-stage { padding: 12px 14px; }
        }
    </style>
    <!-- sidebar.js에서 business.html 예외 처리됨 -->
</head>
<body>
    <div class="page">
        <a href="../" class="back">&larr; 대시보드</a>
        <h1>사업현황</h1>
        <p class="subtitle" id="period"></p>

        <!-- 탭 -->
        <div class="tabs">
            <div class="tab active" data-tab="funnel">퍼널</div>
            <div class="tab" data-tab="sales">매출</div>
        </div>

        <!-- 퍼널 탭 -->
        <div class="tab-content active" id="tab-funnel">
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card" data-key="revenue">
                    <div class="stat-label">이번주 매출</div>
                    <div class="stat-value" id="stat-revenue">—</div>
                    <div class="stat-change flat" id="change-revenue"></div>
                </div>
                <div class="stat-card" data-key="paid_customers">
                    <div class="stat-label">유료고객</div>
                    <div class="stat-value" id="stat-paid">—</div>
                    <div class="stat-change flat" id="change-paid"></div>
                </div>
                <div class="stat-card" data-key="landing_visits">
                    <div class="stat-label">랜딩접속</div>
                    <div class="stat-value" id="stat-landing">—</div>
                    <div class="stat-change flat" id="change-landing"></div>
                </div>
                <div class="stat-card" data-key="pulling_views">
                    <div class="stat-label">풀링조회수</div>
                    <div class="stat-value" id="stat-pulling">—</div>
                    <div class="stat-change flat" id="change-pulling"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <div>
                        <div class="section-title section-title-tight">전환 퍼널</div>
                        <div id="funnel-period" class="section-subtitle"></div>
                    </div>
                    <select class="week-select" id="week-select"></select>
                </div>
                <div class="funnel-layout">
                    <div id="funnel-wrap" class="funnel funnel-main"></div>
                    <div class="funnel-side">
                        <div id="bottleneck-rank" class="side-card"></div>
                        <div id="simulator-panel" class="side-card"></div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">주간 추이</div>
                <div class="chart-box">
                    <div class="section-header">
                        <div class="chart-toggle chart-toggle-inline" id="chart-toggle">
                            <button class="active" data-mode="volume">조회수</button>
                            <button data-mode="rates">전환율</button>
                        </div>
                        <select class="week-select" id="chart-range">
                            <option value="8" selected>최근 8주</option>
                            <option value="12">최근 12주</option>
                            <option value="26">최근 26주</option>
                            <option value="0">전체</option>
                        </select>
                    </div>
                    <div class="chart-meta" id="chart-summary"></div>
                    <canvas id="chart-weekly"></canvas>
                </div>
            </div>

            <div class="section">
                <div class="section-title">콘텐츠 성과</div>
                <div class="chart-box" id="content-table-wrap"></div>
            </div>
        </div>

        <!-- 매출 탭 -->
        <div class="tab-content" id="tab-sales">
            <div class="sales-stats" id="sales-stats"></div>

            <div class="section">
                <div class="section-header" style="display:flex;justify-content:space-between;align-items:center;">
                    <div class="section-title" style="margin-bottom:0;">월별 매출 추이</div>
                    <select class="week-select" id="sales-range">
                        <option value="6">최근 6개월</option>
                        <option value="12" selected>최근 12개월</option>
                        <option value="0">전체</option>
                    </select>
                </div>
                <div class="chart-box"><canvas id="chart-monthly"></canvas></div>
            </div>

            <div class="section">
                <div class="section-title">유입 채널별 매출</div>
                <div class="chart-box" id="utm-table-wrap"></div>
            </div>

            <div class="section">
                <div class="section-title">상담 분석</div>
                <div class="chart-box analysis-grid">
                    <div class="analysis-panel">
                        <div class="analysis-label">상담목적별</div>
                        <div class="legend-layout">
                            <div class="legend-chart"><canvas id="chart-purpose"></canvas></div>
                            <div id="purpose-legend" class="legend-text"></div>
                        </div>
                    </div>
                    <div class="analysis-panel">
                        <div class="analysis-label">수도권 / 지방</div>
                        <div class="legend-layout">
                            <div class="legend-chart"><canvas id="chart-region"></canvas></div>
                            <div id="region-legend" class="legend-text"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="updated" id="updated"></div>
    </div>

<script src="../nav.js"></script>
<script src="../footer.js"></script>
<script src="../sidebar.js"></script>
<script>
// datalabels 전역 등록 방지 — 매출 차트에만 수동 적용
ChartDataLabels && Chart.defaults.plugins.datalabels && (Chart.defaults.plugins.datalabels.display = false);
(function() {
    const fmt = n => {
        if (n >= 10000000) return (+(n / 10000000).toFixed(1)) + '천만';
        if (n >= 10000) return (+(n / 10000).toFixed(1)) + '만';
        if (n >= 1000) return (+(n / 1000).toFixed(1)) + '천';
        return String(n);
    };
    const fmtWon = n => {
        if (n >= 10000) return Math.round(n / 10000) + '만원';
        return new Intl.NumberFormat('ko-KR').format(n) + '원';
    };
    const fmtNum = n => new Intl.NumberFormat('ko-KR').format(n);
    const fmtPct = n => n.toFixed(1) + '%';
    const monthLabel = m => {
        const [y, mo] = m.split('-');
        return y.slice(2) + '.' + parseInt(mo) + '월';
    };

    // ── 탭 전환 ──
    let salesRendered = false;
    let funnelPeriodText = '';
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            // 탭별 기준 날짜 전환
            const periodEl = document.getElementById('period');
            if (this.dataset.tab === 'sales' && window._salesData) {
                const label = (window._salesData.summary.current_month_label || '').replace(/^\d{4}-0?/, '');
                periodEl.textContent = label + '월 기준';
            } else {
                periodEl.textContent = funnelPeriodText;
            }
            // 매출 탭 최초 진입 시 차트 렌더링 (canvas 크기 문제 방지)
            if (this.dataset.tab === 'sales' && !salesRendered && window._salesData) {
                renderSalesTab(window._salesData);
                salesRendered = true;
            }
        });
    });

    // ── 데이터 로드 ──
    Promise.all([
        fetch('../data/funnel.json').then(r => r.ok ? r.json() : null),
        fetch('../data/sales.json').then(r => r.ok ? r.json() : null),
        fetch('../data/business-cumulative.json').then(r => r.ok ? r.json() : null),
    ]).then(([funnel, sales, cumulative]) => {
        if (funnel) renderFunnelTab(funnel, cumulative);
        if (sales) window._salesData = sales;
        if (funnel) {
            const dt = new Date(funnel.updated);
            document.getElementById('updated').textContent = '마지막 업데이트: ' + dt.toLocaleString('ko-KR');
            if (funnel.current_week.week_start) {
                funnelPeriodText = funnel.current_week.week_start + ' ~ ' + (funnel.current_week.week_end || '') + ' 기준';
                document.getElementById('period').textContent = funnelPeriodText;
            }
        }
    }).catch(() => {
        document.querySelector('.page').innerHTML += '<div class="error-msg">데이터를 불러올 수 없습니다</div>';
    });

    // ══════════════════════════════════════
    // 퍼널 탭
    // ══════════════════════════════════════

    function renderStatCards(cw, changes) {
        const map = {
            revenue: { el: 'stat-revenue', fmt: fmtWon },
            paid_customers: { el: 'stat-paid', fmt: n => n + '명' },
            landing_visits: { el: 'stat-landing', fmt: n => n + '건' },
            pulling_views: { el: 'stat-pulling', fmt: n => fmtNum(n) + '회' },
        };
        let worstKey = null, worstPct = Infinity;
        document.querySelectorAll('.stat-card.worst').forEach(c => c.classList.remove('worst'));
        for (const [key, cfg] of Object.entries(map)) {
            document.getElementById(cfg.el).textContent = cfg.fmt(cw[key] || 0);
            const chg = changes[key];
            const chgEl = document.getElementById('change-' + key.split('_')[0]);
            if (chg === 0) {
                chgEl.textContent = '변동 없음';
                chgEl.className = 'stat-change flat';
            } else if (chg !== null && chg !== undefined) {
                const sign = chg > 0 ? '▲' : '▼';
                chgEl.textContent = sign + Math.abs(chg) + '%';
                chgEl.className = 'stat-change ' + (chg > 0 ? 'up' : 'down');
                if (chg < worstPct) { worstPct = chg; worstKey = key; }
            } else {
                chgEl.textContent = '—';
            }
        }
        if (worstKey && worstPct < 0) {
            const card = document.querySelector('.stat-card[data-key="' + worstKey + '"]');
            if (card) card.classList.add('worst');
        }
    }

    // ── 세로 퍼널 (매출 위 → 풀링 아래) ──
    // 신호등 임계값: <50% 빨강 / 50~70% 노랑 / ≥70% 초록
    function signalClass(pct) { return pct >= 70 ? 'green' : pct >= 50 ? 'yellow' : 'red'; }
    function signalTextColor(pct) { return pct >= 70 ? '#059669' : pct >= 50 ? '#D97706' : '#DC2626'; }

    function renderFunnel(cw, rates, targets) {
        // 매출+유료고객 (맨 위), 랜딩, 키콘텐츠, 풀링 (맨 아래)
        const stages = [
            {
                label: '매출',
                value: fmtWon(cw.revenue || 0),
                sub: '유료고객 ' + (cw.paid_customers || 0) + '명',
                actual: cw.revenue || 0,
                target: targets.revenue || 1000000,
                targetLabel: '목표 ' + fmtWon(targets.revenue || 1000000),
            },
            {
                label: '랜딩 접속',
                value: fmtNum(cw.landing_visits || 0) + '건',
                actual: cw.landing_visits || 0,
                target: targets.landing_visits || 100,
                targetLabel: '목표 ' + (targets.landing_visits || 100) + '건',
            },
            {
                label: '키콘텐츠 조회수',
                value: fmtNum(cw.key_views || 0),
                actual: cw.key_views || 0,
                target: targets.key_views || 1000,
                targetLabel: '목표 ' + fmtNum(targets.key_views || 1000),
            },
            {
                label: '풀링 조회수',
                value: fmtNum(cw.pulling_views || 0),
                actual: cw.pulling_views || 0,
                target: targets.pulling_views || 5000,
                targetLabel: '목표 ' + fmtNum(targets.pulling_views || 5000),
            },
        ];

        // 전환율 (위→아래 각 단계 사이)
        const connectors = [
            { label: '전환율', rate: rates.convert_rate, target: targets.convert_rate || 5 },
            { label: '링크클릭률', rate: rates.link_click_rate, target: targets.link_click_rate || 5 },
            { label: '연계율', rate: rates.interest_rate, target: targets.interest_rate || 20 },
        ];

        // 병목 찾기: 목표 미달 전환율 모두 + 최악 찾기
        let worstIdx = -1, worstRatio = Infinity;
        connectors.forEach((c, i) => {
            if (c.target > 0) {
                const ratio = c.rate / c.target;
                if (ratio < worstRatio) { worstRatio = ratio; worstIdx = i; }
            }
        });

        let html = '';
        for (let i = 0; i < stages.length; i++) {
            const s = stages[i];
            const ratio = s.target > 0 ? Math.min(s.actual / s.target, 1) : 0;
            const pctAchieved = s.target > 0 ? Math.round(s.actual / s.target * 100) : 0;
            const barColor = signalClass(pctAchieved);
            const barTitle = '목표 대비 ' + pctAchieved + '% 달성';

            html += '<div class="funnel-stage">';
            html += '<div class="funnel-stage-left">';
            html += '<div class="funnel-stage-label">' + s.label + '</div>';
            html += '<div class="funnel-stage-value">' + s.value + '</div>';
            if (s.sub) html += '<div class="funnel-stage-sub">' + s.sub + '</div>';
            html += '</div>';
            html += '<div class="funnel-stage-right">';
            html += '<div class="funnel-stage-target">' + s.targetLabel + '</div>';
            html += '</div>';
            html += '</div>';
            // 진행률 바 + 달성률 (바 오른쪽에 % 표시)
            html += '<div class="progress-row">';
            html += '<div class="funnel-bar funnel-bar-progress" title="' + barTitle + '"><div class="funnel-bar-fill ' + barColor + '" style="width:' + Math.round(ratio * 100) + '%"></div></div>';
            html += '<span class="progress-pct" style="color:' + signalTextColor(pctAchieved) + ';">' + pctAchieved + '%</span>';
            html += '</div>';

            // 전환율 커넥터 (마지막 단계 제외)
            if (i < connectors.length) {
                const c = connectors[i];
                const cRatio = c.target > 0 ? c.rate / c.target : 1;
                const isBelowTarget = cRatio < 1;
                const isWorst = i === worstIdx;
                const color = signalClass(Math.round(cRatio * 100));

                html += '<div class="funnel-connector">';
                html += '<div class="funnel-arrow">↓</div>';
                html += '<div class="funnel-rate-badge ' + color + (isWorst && isBelowTarget ? ' bottleneck' : '') + '">';
                html += c.label + ' ' + fmtPct(c.rate);
                html += '</div>';
                html += '<span class="funnel-rate-target">목표 ' + fmtPct(c.target) + '</span>';
                if (isWorst && isBelowTarget) {
                    html += '<span class="bottleneck-label worst">최대 병목</span>';
                } else if (isBelowTarget) {
                    html += '<span class="bottleneck-label">병목</span>';
                }
                html += '</div>';
            }
        }

        document.getElementById('funnel-wrap').innerHTML = html;

        // 병목 순위 (오른쪽 패널)
        const allItems = [
            ...connectors.map(c => ({ label: c.label, rate: c.rate, target: c.target, ratio: c.target > 0 ? c.rate / c.target : 999 })),
            ...stages.map(s => ({ label: s.label, rate: s.actual, target: s.target, ratio: s.target > 0 ? s.actual / s.target : 999 })),
        ].filter(x => x.ratio < 1).sort((a, b) => a.ratio - b.ratio);

        let rankHtml = '<div class="rank-title">병목 순위</div>';
        if (allItems.length === 0) {
            rankHtml += '<div class="rank-empty">모든 지표 목표 달성!</div>';
        } else {
            allItems.forEach((item, idx) => {
                const pct = Math.round(item.ratio * 100);
                rankHtml += '<div class="rank-row">';
                rankHtml += '<span class="signal-dot" style="color:' + signalTextColor(pct) + ';">\u25cf</span>';
                rankHtml += '<span class="rank-index" style="color:' + (idx === 0 ? '#DC2626' : '#64748B') + ';">' + (idx + 1) + '</span>';
                rankHtml += '<span class="rank-label">' + item.label + '</span>';
                rankHtml += '<span class="rank-value" style="color:' + signalTextColor(pct) + ';">' + pct + '%</span>';
                rankHtml += '</div>';
            });
        }
        document.getElementById('bottleneck-rank').innerHTML = rankHtml;

        // 시뮬레이터 초기값 세팅 (주차 변경 시마다 갱신)
        initSimulator(cw, targets);
    }

    function initSimulator(cw, targets) {
        const unitPrice = targets.unit_price || 440000;
        const interestRate = cw.interest_rate || targets.interest_rate || 20;
        const linkClickRate = cw.link_click_rate || targets.link_click_rate || 2.5;
        const convertRate = cw.convert_rate || targets.convert_rate || 3;
        const fmtField = function(label, hint, id, val, step) {
            return '<div class="sim-field">' +
                '<div class="sim-field-header"><span class="sim-field-label">' + label + '</span><span class="sim-hint">기준 ' + hint + '</span></div>' +
                '<input class="sim-field-input" id="' + id + '" type="number" step="' + (step || 1) + '" value="' + val + '"></div>';
        };
        const html =
            '<div class="sim-title">시뮬레이터</div>' +
            '<div class="sim-result">' +
            '<div class="sim-result-label">목표 매출</div>' +
            '<div class="sim-revenue-row"><input class="sim-revenue-input" id="sim-revenue" type="text" inputmode="numeric" placeholder="0"><span class="sim-revenue-unit">만원</span></div>' +
            '<div class="sim-sub-item" id="sim-sub-customers">유료고객 —명</div>' +
            '<div class="sim-sub-item" id="sim-sub-customers">유료고객 —명</div>' +
            '</div>' +
            '<div class="sim-field"><div class="sim-field-header"><span class="sim-field-label">객단가</span></div>' +
            '<input class="sim-field-input" id="sim-price" type="text" value="' + unitPrice.toLocaleString('ko-KR') + '"></div>' +
            '<div class="sim-arrow">↓</div>' +
            fmtField('유료고객 전환율 (%)', convertRate.toFixed(1) + '%', 'sim-convert', convertRate.toFixed(1), '0.1') +
            '<div class="sim-computed" id="sim-out-customers">→ 유료고객 —명</div>' +
            '<div class="sim-arrow">↓</div>' +
            fmtField('링크클릭률 (%)', linkClickRate.toFixed(1) + '%', 'sim-click', linkClickRate.toFixed(1), '0.1') +
            '<div class="sim-computed" id="sim-out-landing">→ 랜딩접속 —건</div>' +
            '<div class="sim-arrow">↓</div>' +
            '<div class="sim-field"><div class="sim-field-header"><span class="sim-field-label">키콘텐츠 조회수</span></div>' +
            '<input class="sim-field-input" id="sim-key" type="text" inputmode="numeric" value="' + (cw.key_views || 0).toLocaleString('ko-KR') + '"></div>' +
            '<div class="sim-arrow">↓</div>' +
            fmtField('연계율 (%)', interestRate.toFixed(1) + '%', 'sim-interest', interestRate.toFixed(1), '0.1') +
            '<div class="sim-computed" id="sim-out-pulling">→ 풀링 —</div>';
        document.getElementById('simulator-panel').innerHTML = html;
        document.getElementById('sim-key').addEventListener('input', function() {
            var raw = this.value.replace(/,/g, '');
            var num = parseInt(raw) || 0;
            var pos = this.selectionStart;
            var oldLen = this.value.length;
            this.value = num > 0 ? num.toLocaleString('ko-KR') : '';
            this.selectionStart = this.selectionEnd = pos + (this.value.length - oldLen);
            calcSimulator('forward');
        });
        ['sim-interest', 'sim-click', 'sim-convert'].forEach(function(id) {
            document.getElementById(id).addEventListener('input', function() { calcSimulator('reverse'); });
        });
        document.getElementById('sim-price').addEventListener('input', function() {
            var raw = this.value.replace(/,/g, '');
            var num = parseInt(raw) || 0;
            var pos = this.selectionStart;
            this.value = num.toLocaleString('ko-KR');
            calcSimulator('reverse');
        });
        // 매출 직접 입력 → 키조회수 역산 + 중간결과 전부 갱신
        var revInput = document.getElementById('sim-revenue');
        revInput.addEventListener('input', function() {
            var raw = this.value.replace(/,/g, '');
            var manwon = parseInt(raw) || 0;
            var pos = this.selectionStart;
            var oldLen = this.value.length;
            this.value = manwon > 0 ? manwon.toLocaleString('ko-KR') : '';
            this.selectionStart = this.selectionEnd = pos + (this.value.length - oldLen);
        });
        revInput.addEventListener('blur', function() {
            calcSimulator('reverse');
        });
        calcSimulator('forward');
    }

    // mode: 'forward' = 키조회수→매출, 'reverse' = 목표매출 유지→키조회수 역산
    function calcSimulator(mode) {
        var revEl = document.getElementById('sim-revenue');
        var keyEl = document.getElementById('sim-key');
        if (revEl === document.activeElement) return;
        const interest = parseFloat(document.getElementById('sim-interest').value) || 0;
        const click = parseFloat(document.getElementById('sim-click').value) || 0;
        const convert = parseFloat(document.getElementById('sim-convert').value) || 0;
        const priceRaw = (document.getElementById('sim-price').value || '').replace(/,/g, '');
        const price = parseFloat(priceRaw) || 0;

        var key;
        if (mode === 'reverse') {
            // 목표매출 유지하면서 키조회수 역산
            var targetRev = (parseInt((revEl.value || '').replace(/,/g, '')) || 0) * 10000;
            var customers = price > 0 ? targetRev / price : 0;
            var landing = convert > 0 ? customers / (convert / 100) : 0;
            // landing = (key + pulling) * click/100 = (key + key/(interest/100)) * click/100
            // landing = key * (1 + 100/interest) * click/100
            var multiplier = interest > 0 && click > 0 ? (1 + 100 / interest) * (click / 100) : 0;
            key = multiplier > 0 ? landing / multiplier : 0;
            keyEl.value = Math.round(key).toLocaleString('ko-KR');
        } else {
            key = parseFloat((keyEl.value || '').replace(/,/g, '')) || 0;
        }

        const pulling = interest > 0 ? key / (interest / 100) : 0;
        const landing = (key + pulling) * (click / 100);
        const customers = landing * (convert / 100);
        const revenue = customers * price;
        if (mode !== 'reverse') {
            revEl.value = Math.round(revenue / 10000).toLocaleString('ko-KR');
        }
        document.getElementById('sim-sub-customers').textContent = '유료고객 ' + customers.toFixed(1) + '명';
        document.getElementById('sim-out-pulling').textContent = '→ 풀링 ' + fmtNum(Math.round(pulling));
        document.getElementById('sim-out-landing').textContent = '→ 랜딩접속 ' + fmtNum(Math.round(landing)) + '건';
        document.getElementById('sim-out-customers').textContent = '→ 유료고객 ' + customers.toFixed(1) + '명';
    }

    // ── 주간 추이 ──
    let weeklyChart = null;
    function renderWeeklyChart(history, mode, targets) {
        const ctx = document.getElementById('chart-weekly').getContext('2d');
        if (weeklyChart) weeklyChart.destroy();

        const labels = history.map(w => {
            const d = w.week_start || w.label || '';
            if (!d) return '';
            const parts = d.split('-');
            return parseInt(parts[1]) + '/' + parseInt(parts[2]);
        });

        // 목표선 데이터셋 생성기 (연한 점선, 모든 x에 동일 값)
        const targetLine = (label, value, color, category, yAxisID) => ({
            label: label + ' 목표',
            data: history.map(() => value),
            borderColor: color,
            borderWidth: 1.5,
            borderDash: [4, 4],
            pointRadius: 0,
            pointHoverRadius: 0,
            fill: false,
            tension: 0,
            isTarget: true,
            category,
            ...(yAxisID ? { yAxisID } : {}),
        });

        const t = targets || {};
        let datasets, scales;
        if (mode === 'volume') {
            datasets = [
                { label: '풀링 조회수', category: 'pulling_views', data: history.map(w => w.pulling_views || 0), borderColor: '#0077C8', backgroundColor: 'rgba(0,119,200,0.1)', borderWidth: 2, tension: 0.3, fill: true },
                { label: '키콘텐츠 조회수', category: 'key_views', data: history.map(w => w.key_views || 0), borderColor: '#059669', backgroundColor: 'rgba(5,150,105,0.1)', borderWidth: 2, tension: 0.3, fill: true, yAxisID: 'y1' },
                { label: '합계 (풀링+키)', category: 'sum', data: history.map(w => (w.pulling_views || 0) + (w.key_views || 0)), borderColor: '#8B5CF6', borderWidth: 2, tension: 0.3, borderDash: [5, 3], pointRadius: 0 },
            ];
            const sumTarget = (t.pulling_views || 0) + (t.key_views || 0);
            if (sumTarget > 0) datasets.push(targetLine('합계', sumTarget, 'rgba(139,92,246,0.5)', 'sum'));
            if (t.key_views) datasets.push(targetLine('키콘텐츠 조회수', t.key_views, 'rgba(5,150,105,0.45)', 'key_views', 'y1'));
            scales = {
                y: { ticks: { callback: v => fmt(v) }, grid: { color: '#F1F5F9' }, position: 'left' },
                y1: { ticks: { callback: v => fmt(v) }, grid: { display: false }, position: 'right' },
                x: { grid: { display: false } },
            };
        } else {
            datasets = [
                { label: '연계율', category: 'interest_rate', data: history.map(w => w.interest_rate || 0), borderColor: '#0077C8', borderWidth: 2, tension: 0.3, pointRadius: 3 },
                { label: '링크클릭률', category: 'link_click_rate', data: history.map(w => w.link_click_rate || 0), borderColor: '#F59E0B', borderWidth: 2, tension: 0.3, pointRadius: 3 },
                { label: '전환율', category: 'convert_rate', data: history.map(w => w.convert_rate || 0), borderColor: '#DC2626', borderWidth: 2, tension: 0.3, pointRadius: 3 },
            ];
            if (t.interest_rate) datasets.push(targetLine('연계율', t.interest_rate, 'rgba(0,119,200,0.45)', 'interest_rate'));
            if (t.link_click_rate) datasets.push(targetLine('링크클릭률', t.link_click_rate, 'rgba(245,158,11,0.5)', 'link_click_rate'));
            if (t.convert_rate) datasets.push(targetLine('전환율', t.convert_rate, 'rgba(220,38,38,0.45)', 'convert_rate'));
            // Y축: 보이는 데이터 기준 자동 스케일, 최대 20% 캡
            scales = {
                y: { afterDataLimits: scale => { scale.max = Math.min(scale.max * 1.2, 20); }, ticks: { callback: v => (+v.toFixed(1)) + '%' }, grid: { color: '#F1F5F9' } },
                x: { grid: { display: false } },
            };
        }

        weeklyChart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets },
            options: {
                responsive: true,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12, padding: 16, font: { size: 12, weight: '600' }, generateLabels: function(chart) { return Chart.defaults.plugins.legend.labels.generateLabels(chart).filter(l => !chart.data.datasets[l.datasetIndex].isTarget).map(l => { if (chart.getDatasetMeta(l.datasetIndex).hidden) { l.fontColor = '#CBD5E1'; l.fillStyle = '#E2E8F0'; l.strokeStyle = '#E2E8F0'; } return l; }); } }, onClick: function(e, item, legend) { Chart.defaults.plugins.legend.onClick.call(this, e, item, legend); const chart = legend.chart; const cat = chart.data.datasets[item.datasetIndex] && chart.data.datasets[item.datasetIndex].category; if (cat) { const visible = chart.isDatasetVisible(item.datasetIndex); chart.data.datasets.forEach((d, i) => { if (d.isTarget && d.category === cat) chart.setDatasetVisibility(i, visible); }); } chart.update(); } },
                    tooltip: { filter: item => !item.dataset.isTarget, callbacks: { label: ctx => ctx.dataset.label + ': ' + (mode === 'rates' ? ctx.raw.toFixed(2) + '%' : fmtNum(ctx.raw)) } }
                },
                scales,
            },
        });
    }

    function summarizeRange(history, rangeVal) {
        const items = rangeVal > 0 ? history.slice(-rangeVal) : history;
        if (!items.length) return null;
        return {
            label: rangeVal > 0 ? '최근 ' + rangeVal + '주' : '전체',
            weeks: items.length,
            week_start: items[0].week_start || '',
            week_end: items[items.length - 1].week_end || '',
            totals: {
                revenue: items.reduce((sum, week) => sum + (week.revenue || 0), 0),
                paid_customers: items.reduce((sum, week) => sum + (week.paid_customers || 0), 0),
                landing_visits: items.reduce((sum, week) => sum + (week.landing_visits || 0), 0),
                total_views: items.reduce((sum, week) => sum + (week.key_views || 0) + (week.pulling_views || 0), 0),
            },
        };
    }

    function resolveRangeSummary(cumulative, history, rangeVal) {
        if (cumulative && cumulative.windows) {
            const key = rangeVal > 0 ? String(rangeVal) : 'all';
            if (cumulative.windows[key]) return cumulative.windows[key];
        }
        return summarizeRange(history, rangeVal);
    }

    function renderChartSummary(summary, totalWeeks) {
        const el = document.getElementById('chart-summary');
        if (!summary || !summary.totals) {
            el.textContent = '';
            return;
        }
        const rangeLabel = summary.label || '';
        const totalLabel = totalWeeks
            ? (rangeLabel === '전체' ? '누적 ' + totalWeeks + '주' : '누적 ' + totalWeeks + '주 중 ' + rangeLabel)
            : rangeLabel;
        const period = summary.week_start + (summary.week_end ? ' ~ ' + summary.week_end : '');
        el.textContent =
            totalLabel + ' · ' + period +
            ' · 총조회 ' + fmtNum(summary.totals.total_views || 0) +
            ' · 랜딩 ' + fmtNum(summary.totals.landing_visits || 0) +
            '건 · 유료 ' + fmtNum(summary.totals.paid_customers || 0) +
            '명 · 매출 ' + fmtWon(summary.totals.revenue || 0);
    }

    // ── 콘텐츠 성과 (키/풀링 분리) ──
    function renderContentTable(cw, avg) {
        function makeTable(rows) {
            let h = '<table><thead><tr><th>지표</th><th class="text-right">이번주</th><th class="text-right">4주평균</th><th class="text-right">변화</th></tr></thead><tbody>';
            rows.forEach(r => {
                let curStr, avgStr, change;
                if (r.isTime) {
                    curStr = r.cur || '—'; avgStr = typeof r.avg === 'string' ? r.avg : '—'; change = null;
                } else if (r.isPct) {
                    curStr = (r.cur || 0).toFixed(1) + '%'; avgStr = (r.avg || 0).toFixed(1) + '%';
                    change = r.avg > 0 ? ((r.cur - r.avg) / r.avg * 100) : null;
                } else {
                    curStr = fmtNum(r.cur || 0); avgStr = fmtNum(Math.round(r.avg || 0));
                    change = r.avg > 0 ? ((r.cur - r.avg) / r.avg * 100) : null;
                }
                let changeStr = '—';
                if (change !== null && isFinite(change)) {
                    const sign = change > 0 ? '▲' : change < 0 ? '▼' : '';
                    const cls = change > 0 ? 'badge-up' : change < 0 ? 'badge-down' : '';
                    changeStr = '<span class="' + cls + '">' + sign + Math.abs(change).toFixed(1) + '%</span>';
                }
                h += '<tr><td>' + r.label + '</td><td class="text-right">' + curStr + '</td><td class="text-right">' + avgStr + '</td><td class="text-right">' + changeStr + '</td></tr>';
            });
            h += '</tbody></table>';
            return h;
        }

        const keyRows = [
            { label: '시청지속시간', cur: cw.key_watch_time, avg: avg.key_watch_time || '—', isTime: true },
            { label: '클릭률', cur: cw.key_ctr, avg: avg.key_ctr, isPct: true },
            { label: '검색유입', cur: cw.key_search_traffic, avg: avg.key_search_traffic },
            { label: '페이지유입', cur: cw.key_page_traffic, avg: avg.key_page_traffic },
        ];
        const pullRows = [
            { label: '시청지속시간', cur: cw.pulling_watch_time, avg: avg.pulling_watch_time || '—', isTime: true },
            { label: '클릭률', cur: cw.pulling_ctr, avg: avg.pulling_ctr, isPct: true },
            { label: '탐색유입', cur: cw.explore_traffic, avg: avg.explore_traffic },
            { label: 'Shorts 조회수', cur: cw.shorts_views, avg: avg.shorts_views },
            { label: '구독자 증가', cur: cw.subscriber_increase, avg: avg.subscriber_increase },
        ];

        let html = '<div class="content-group"><div class="content-group-title">키콘텐츠</div>' + makeTable(keyRows) + '</div>';
        html += '<div class="content-group"><div class="content-group-title">풀링콘텐츠</div>' + makeTable(pullRows) + '</div>';
        document.getElementById('content-table-wrap').innerHTML = html;
    }

    function renderFunnelTab(data, cumulative) {
        const history = data.weekly_history || [];
        const targets = data.targets;

        // 주차 선택 드롭다운
        const select = document.getElementById('week-select');
        history.slice().reverse().forEach((w, ri) => {
            const idx = history.length - 1 - ri;
            const opt = document.createElement('option');
            opt.value = idx;
            const ws = w.week_start || '';
            const we = w.week_end || '';
            opt.textContent = (idx === history.length - 1 ? '이번주 ' : '') + ws + (we ? ' ~ ' + we : '');
            select.appendChild(opt);
        });

        function showWeek(idx) {
            const w = history[idx];
            if (!w) return;
            const rates = {
                interest_rate: w.interest_rate || 0,
                link_click_rate: w.link_click_rate || 0,
                convert_rate: w.convert_rate || 0,
            };
            // 카드는 이번주만 (전주 대비 변동)
            if (idx === history.length - 1) {
                renderStatCards(data.current_week, data.changes || {});
            } else {
                renderStatCards(w, {});
            }
            renderFunnel(w, rates, targets);
            // 콘텐츠 성과도 선택된 주 기준으로 갱신
            renderContentTable(w, data.avg_4w || {});
        }

        function updatePeriodLabel(w) {
            const ws = w.week_start || '';
            const we = w.week_end || '';
            document.getElementById('funnel-period').textContent = ws + (we ? ' ~ ' + we : '');
        }

        select.addEventListener('change', () => {
            const idx = parseInt(select.value);
            showWeek(idx);
            updatePeriodLabel(history[idx]);
        });

        // 초기 렌더링 (이번주)
        renderStatCards(data.current_week, data.changes || {});
        renderFunnel(data.current_week, data.rates, targets);
        renderContentTable(data.current_week, data.avg_4w || {});
        updatePeriodLabel(data.current_week);

        // 차트 기간 선택 + 모드 토글
        let currentMode = 'volume';
        function updateChart() {
            const rangeVal = parseInt(document.getElementById('chart-range').value);
            const sliced = rangeVal > 0 ? history.slice(-rangeVal) : history;
            renderWeeklyChart(sliced, currentMode, targets);
            renderChartSummary(resolveRangeSummary(cumulative, history, rangeVal), history.length);
        }

        if (history.length > 1) {
            updateChart();
            document.querySelectorAll('#chart-toggle button').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#chart-toggle button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentMode = this.dataset.mode;
                    updateChart();
                });
            });
            document.getElementById('chart-range').addEventListener('change', updateChart);
        }
    }

    // ══════════════════════════════════════
    // 매출 탭 (기존 sales.html 내용 통합)
    // ══════════════════════════════════════

    function renderSalesTab(d) {
        const s = d.summary || {};

        // 요약 카드
        let statsHtml = '';
        const curLabel = (s.current_month_label || '').replace(/^\d{4}-0?/, '') + '월 매출';
        const lastLabel = (s.last_month_label || '').replace(/^\d{4}-0?/, '') + '월 매출';
        statsHtml += '<div class="stat-card"><div class="stat-label">' + curLabel + '</div><div class="stat-value">' + fmtWon(s.current_month || 0) + '</div><div class="stat-change flat">누적 ' + (s.total_customers || 0) + '명</div></div>';
        statsHtml += '<div class="stat-card"><div class="stat-label">' + lastLabel + '</div><div class="stat-value">' + fmtWon(s.last_month || 0) + '</div></div>';
        const chgPct = s.change_pct || '—';
        const chgClass = chgPct.startsWith('+') ? 'up' : chgPct.startsWith('-') ? 'down' : 'flat';
        statsHtml += '<div class="stat-card"><div class="stat-label">전월 대비</div><div class="stat-value stat-value-lg" style="color:' + (chgClass === 'up' ? '#059669' : chgClass === 'down' ? '#DC2626' : '#64748B') + ';">' + chgPct + '</div></div>';
        document.getElementById('sales-stats').innerHTML = statsHtml;

        // 월별 매출 차트 (기간 필터 + 바 위 숫자)
        let monthlyChart = null;
        function renderMonthlyChart(data, range) {
            const sliced = range > 0 ? data.slice(-range) : data;
            if (monthlyChart) monthlyChart.destroy();
            monthlyChart = new Chart(document.getElementById('chart-monthly').getContext('2d'), {
                type: 'bar',
                data: { labels: sliced.map(m => monthLabel(m.month)), datasets: [{ label: '매출', data: sliced.map(m => m.revenue), backgroundColor: '#0077C8', borderRadius: 6, barPercentage: 0.6 }] },
                options: {
                    responsive: true,
                    layout: { padding: { top: 24 } },
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: ctx => fmtNum(ctx.raw) + '원 (' + sliced[ctx.dataIndex].customers + '명)' } },
                        datalabels: { anchor: 'end', align: 'top', color: '#64748B', font: { size: 11, weight: 500 }, formatter: v => Math.round(v / 10000) }
                    },
                    scales: { y: { ticks: { callback: v => fmt(v) }, grid: { color: '#F1F5F9' } }, x: { grid: { display: false } } }
                },
                plugins: [ChartDataLabels]
            });
        }
        if (d.monthly && d.monthly.length) {
            renderMonthlyChart(d.monthly, 12);
            document.getElementById('sales-range').addEventListener('change', function() {
                renderMonthlyChart(d.monthly, parseInt(this.value));
            });
        }

        // UTM 테이블
        if (d.by_utm && d.by_utm.length) {
            let html = '<table><thead><tr><th>채널</th><th class="text-right">건수</th><th class="text-right">매출</th></tr></thead><tbody>';
            d.by_utm.forEach(u => {
                const label = u.utm === '(직접)' ? '직접 유입' : u.utm.replace('yt_', '영상 #');
                html += '<tr><td>' + label + '</td><td class="text-right">' + u.count + '건</td><td class="text-right">' + fmtWon(u.revenue) + '</td></tr>';
            });
            html += '</tbody></table>';
            document.getElementById('utm-table-wrap').innerHTML = html;
        }

        // 목적별 doughnut
        if (d.by_purpose && d.by_purpose.length) {
            const colors = ['#0077C8', '#059669', '#F59E0B', '#8B5CF6'];
            new Chart(document.getElementById('chart-purpose').getContext('2d'), {
                type: 'doughnut',
                data: { labels: d.by_purpose.map(p => p.purpose), datasets: [{ data: d.by_purpose.map(p => p.revenue), backgroundColor: colors.slice(0, d.by_purpose.length), borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.label + ': ' + fmtNum(ctx.raw) + '원' } } }, cutout: '60%' }
            });
            let legend = '';
            d.by_purpose.forEach((p, i) => { legend += '<div class="legend-item"><span class="legend-dot" style="background:' + colors[i % colors.length] + ';"></span><strong>' + p.purpose + '</strong> ' + p.ratio + ' (' + fmtWon(p.revenue) + ')</div>'; });
            document.getElementById('purpose-legend').innerHTML = legend;
        }

        // 지역 doughnut
        if (d.by_region && d.by_region.length) {
            const rColors = ['#0077C8', '#F59E0B', '#94A3B8'];
            new Chart(document.getElementById('chart-region').getContext('2d'), {
                type: 'doughnut',
                data: { labels: d.by_region.map(r => r.region), datasets: [{ data: d.by_region.map(r => r.count), backgroundColor: rColors.slice(0, d.by_region.length), borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.label + ': ' + ctx.raw + '명 (' + fmtWon(d.by_region[ctx.dataIndex].revenue) + ')' } } }, cutout: '60%' }
            });
            let rLegend = '';
            d.by_region.forEach((r, i) => { rLegend += '<div class="legend-item"><span class="legend-dot" style="background:' + rColors[i % rColors.length] + ';"></span><strong>' + r.region + '</strong> ' + r.ratio + ' (' + r.count + '명)</div>'; });
            document.getElementById('region-legend').innerHTML = rLegend;
        }
    }
})();
</script>
</body>
</html>
