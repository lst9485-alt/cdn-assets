<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>경쟁채널 - 운영 대시보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #F8FAFC; color: #1E293B; line-height: 1.55; }
    .page { max-width: 1180px; margin: 0 auto; padding: 32px 20px 64px; }
    .back { display: inline-block; color: #64748B; text-decoration: none; font-size: 14px; margin-bottom: 18px; }
    .back:hover { color: #DC2626; }
    .header { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 20px; }
    h1 { font-size: 24px; font-weight: 850; color: #0F172A; }
    .subtitle { color: #64748B; font-size: 14px; margin-top: 4px; }
    .header-side { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; min-width: 260px; }
    .updated { color: #94A3B8; font-size: 12px; text-align: right; }
    .guide { position: relative; }
    .guide-toggle { border: 1px solid #E2E8F0; background: #fff; color: #475569; border-radius: 7px; padding: 6px 10px; font-size: 12px; font-weight: 800; cursor: pointer; }
    .guide-toggle:hover { border-color: #94A3B8; color: #0F172A; }
    .guide-panel { display: none; position: absolute; right: 0; top: calc(100% + 6px); width: 310px; padding: 12px; background: #fff; border: 1px solid #CBD5E1; border-radius: 8px; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.14); z-index: 20; text-align: left; }
    .guide.open .guide-panel { display: block; }
    .guide-title { font-size: 13px; font-weight: 850; color: #0F172A; margin-bottom: 6px; }
    .guide-line { font-size: 12px; color: #475569; margin-top: 5px; }
    .guide-line strong { color: #0F172A; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
    .stat { background: #fff; border: 1px solid #E2E8F0; border-radius: 8px; padding: 13px 14px; }
    .stat-label { color: #64748B; font-size: 12px; font-weight: 700; }
    .stat-value { color: #0F172A; font-size: 20px; font-weight: 850; margin-top: 2px; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr); gap: 14px; }
    .section { background: #fff; border: 1px solid #E2E8F0; border-radius: 8px; padding: 16px; }
    .section-title { font-size: 16px; font-weight: 850; color: #0F172A; margin-bottom: 10px; }
    .section-subtitle { color: #94A3B8; font-size: 12px; margin-top: -6px; margin-bottom: 10px; }
    .video-list { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .video-card { border: 1px solid #E2E8F0; border-radius: 8px; padding: 12px; background: #fff; }
    .video-head { display: grid; grid-template-columns: 26px 1fr; gap: 9px; align-items: start; }
    .rank { width: 22px; height: 22px; border-radius: 5px; background: #F1F5F9; color: #475569; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 850; }
    .title { color: #0F172A; font-size: 14px; font-weight: 760; text-decoration: none; line-height: 1.45; }
    .title:hover { color: #DC2626; }
    .source { color: #64748B; font-size: 12px; margin-top: 3px; }
    .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .pill { display: inline-flex; align-items: center; gap: 3px; min-height: 24px; padding: 3px 7px; border-radius: 5px; background: #F8FAFC; color: #64748B; font-size: 12px; font-weight: 750; white-space: nowrap; }
    .pill strong { color: #0F172A; font-weight: 850; }
    .pill.good { background: #ECFDF5; color: #059669; }
    .pill.good strong { color: #059669; }
    .pill.ok { background: #EFF6FF; color: #2563EB; }
    .pill.ok strong { color: #2563EB; }
    .pill.watch { background: #FFFBEB; color: #D97706; }
    .pill.watch strong { color: #D97706; }
    details.section { padding: 0; overflow: hidden; }
    details.section summary { cursor: pointer; list-style: none; padding: 14px 16px; font-size: 15px; font-weight: 850; color: #0F172A; display: flex; justify-content: space-between; gap: 12px; }
    details.section summary::-webkit-details-marker { display: none; }
    details.section summary::after { content: "펼치기"; color: #94A3B8; font-size: 12px; font-weight: 750; }
    details.section[open] summary::after { content: "접기"; }
    .details-body { padding: 0 16px 16px; }
    .channel-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .channel { background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 8px; padding: 10px 11px; }
    .channel-name { font-size: 13px; font-weight: 850; color: #0F172A; }
    .channel-meta { color: #64748B; font-size: 12px; margin-top: 3px; }
    .hint { background: #FFF7ED; border: 1px solid #FED7AA; border-radius: 8px; padding: 9px 11px; margin-bottom: 7px; }
    .hint strong { color: #9A3412; }
    .empty, .error { color: #94A3B8; font-size: 14px; padding: 18px; text-align: center; border: 1px dashed #CBD5E1; border-radius: 8px; background: #F8FAFC; }
    @media (max-width: 860px) {
      .stats, .channel-grid { grid-template-columns: 1fr; }
      .header { display: block; }
      .header-side { align-items: flex-start; min-width: 0; margin-top: 10px; }
      .updated { text-align: left; }
      .guide-panel { left: 0; right: auto; width: min(310px, calc(100vw - 40px)); }
    }
  </style>
</head>
<body>
  <div class="page">
    <a href="../" class="back">&larr; 메인</a>
    <div class="header">
      <div>
        <h1>경쟁채널 모니터링</h1>
        <p class="subtitle">구독자수와 채널 평균 대비 잘된 영상을 중심으로 보는 경쟁 채널 흐름</p>
      </div>
      <div class="header-side">
        <div class="updated" id="updated">로딩 중...</div>
        <div class="guide" id="guide">
          <button class="guide-toggle" type="button" id="guide-toggle">기준 보기</button>
          <div class="guide-panel">
            <div class="guide-title">지표 기준</div>
            <div class="guide-line"><strong>기여도</strong>: 조회수 ÷ 해당 채널 최근 90일 평균 조회수</div>
            <div class="guide-line"><strong>성과도</strong>: 조회수 기준. 10만 이상 Good, 5만 이상 OK</div>
            <div class="guide-line"><strong>평균대비</strong>: 조회수 ÷ 해당 채널 최근 90일 평균 조회수</div>
            <div class="guide-line"><strong>구독자대비</strong>: 조회수 ÷ 구독자수</div>
          </div>
        </div>
      </div>
    </div>
    <div id="app"><div class="empty">데이터 로딩 중...</div></div>
  </div>
<script>
fetch('../data/competitors/latest.json?v=' + Date.now())
  .then(function(r) { if (!r.ok) throw new Error('load failed'); return r.json(); })
  .then(render)
  .catch(function() {
    document.getElementById('app').innerHTML = '<div class="error">데이터를 불러오지 못했습니다.</div>';
    document.getElementById('updated').textContent = '';
  });

document.addEventListener('click', function(event) {
  var guide = document.getElementById('guide');
  var toggle = document.getElementById('guide-toggle');
  if (!guide || !toggle) return;
  if (toggle.contains(event.target)) {
    guide.classList.toggle('open');
    return;
  }
  if (!guide.contains(event.target)) guide.classList.remove('open');
});

function render(data) {
  document.getElementById('updated').textContent = '업데이트 ' + fmtDate(data.updated_at);
  var s = data.summary || {};
  var html = '';
  html += '<div class="stats">';
  html += stat('리포트 날짜', data.report_date || '-');
  html += stat('신규 영상', num(s.new_video_count) + '개');
  html += stat('추적 영상', num(s.tracked_video_count) + '개');
  html += stat('채널', num(s.channel_count) + '개');
  html += '</div>';
  html += '<div class="layout">';
  html += section('잘된 영상', '채널 평균 대비 튄 영상만 먼저 봅니다.', data.contribution_top, 'contribution', 12);
  html += detailSection('신규 영상', data.new_videos, 'published', 10);
  html += detailSection('24시간 조회수 증가 TOP', data.daily_top, 'daily', 10);
  html += detailSection('7일 급상승 TOP', data.weekly_top, 'weekly', 10);
  html += detailSection('최근 90일 조회수 TOP', data.top_90d, 'views', 10);
  html += channelSection(data.channel_summary || []);
  html += hintSection(data.topic_hints || []);
  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

function stat(label, value) {
  return '<div class="stat"><div class="stat-label">' + esc(label) + '</div><div class="stat-value">' + esc(value) + '</div></div>';
}

function section(title, subtitle, rows, mode, limit) {
  var html = '<div class="section"><div class="section-title">' + esc(title) + '</div>';
  if (subtitle) html += '<div class="section-subtitle">' + esc(subtitle) + '</div>';
  html += videoList(rows, mode, limit || 10);
  return html + '</div>';
}

function detailSection(title, rows, mode, limit) {
  var count = rows && rows.length ? rows.length : 0;
  var html = '<details class="section"><summary><span>' + esc(title) + '</span><span>' + count + '개</span></summary><div class="details-body">';
  html += videoList(rows, mode, limit || 10);
  return html + '</div></details>';
}

function videoList(rows, mode, limit) {
  if (!rows || rows.length === 0) return '<div class="empty">데이터가 더 쌓이면 표시됩니다.</div>';
  var html = '<div class="video-list">';
  rows.slice(0, limit || 10).forEach(function(row, idx) {
    html += '<div class="video-card">';
    html += '<div class="video-head"><div class="rank">' + (idx + 1) + '</div><div>';
    html += '<a class="title" href="' + esc(row.url) + '" target="_blank" rel="noopener">' + esc(row.title) + '</a>';
    html += '<div class="source">' + esc(row.channel_name) + '</div>';
    html += pillRow(row, mode);
    html += '</div></div>';
    html += '</div>';
  });
  return html + '</div>';
}

function pillRow(row, mode) {
  var html = '<div class="pills">';
  html += pill('게시일', fmtDate(row.published_at));
  html += pill('조회수', compact(row.view_count), tonePerformance(row.view_count));
  html += pill('구독자', compact(row.subscriber_count));
  html += pill('기여도', gradeContribution(row.contribution_score), toneContribution(row.contribution_score));
  html += pill('성과도', gradePerformance(row.view_count), tonePerformance(row.view_count));
  if (mode === 'daily') html += pill('24h', '+' + compact(row.daily_delta));
  if (mode === 'weekly') html += pill('7일', '+' + compact(row.week_delta));
  if (mode === 'contribution') {
    html += pill('평균대비', ratio(row.contribution_score) + '배');
    html += pill('구독자대비', pct(row.subscriber_view_rate_pct));
  }
  html += '</div>';
  return html;
}

function pill(label, value, tone) {
  return '<span class="pill ' + esc(tone || '') + '">' + esc(label) + ' · <strong>' + esc(value) + '</strong></span>';
}

function channelSection(rows) {
  var html = '<div class="section wide"><div class="section-title">채널별 오늘 요약</div><div class="channel-grid">';
  if (!rows.length) return html + '</div><div class="empty">데이터가 없습니다.</div></div>';
  rows.forEach(function(row) {
    var best = row.best_video || {};
    html += '<div class="channel"><div class="channel-name">' + esc(row.channel_name) + '</div>';
    html += '<div class="channel-meta">구독자 ' + num(row.subscriber_count) + ' · 영상 ' + num(row.video_count) + '개 · 24시간 +' + num(row.daily_delta) + '</div>';
    html += '<div class="channel-meta">최고 상승: ' + esc(best.title || '-') + '</div></div>';
  });
  return html + '</div></div>';
}

function hintSection(rows) {
  var html = '<div class="section wide"><div class="section-title">오늘 참고 주제 힌트</div>';
  if (!rows.length) return html + '<div class="empty">데이터가 더 쌓이면 표시됩니다.</div></div>';
  rows.forEach(function(row) {
    html += '<div class="hint"><strong>' + esc(row.keyword) + '</strong><div class="meta">' + esc(row.sample_title || '') + '</div></div>';
  });
  return html + '</div>';
}

function metric(row, mode) {
  if (mode === 'contribution') return '기여도 ' + ratio(row.contribution_score) + '배 / 구독자대비 ' + pct(row.subscriber_view_rate_pct);
  if (mode === 'daily') return '+' + num(row.daily_delta) + ' / ' + num(row.view_count) + '회';
  if (mode === 'weekly') return '+' + num(row.week_delta) + ' / ' + num(row.view_count) + '회';
  if (mode === 'published') return num(row.view_count) + '회';
  return num(row.view_count) + '회';
}

function gradeContribution(value) {
  var n = Number(value || 0);
  if (n >= 2) return 'Good';
  if (n >= 1) return 'OK';
  return 'Watch';
}

function toneContribution(value) {
  var n = Number(value || 0);
  if (n >= 2) return 'good';
  if (n >= 1) return 'ok';
  return 'watch';
}

function gradePerformance(value) {
  var n = Number(value || 0);
  if (n >= 100000) return 'Good';
  if (n >= 50000) return 'OK';
  return 'Watch';
}

function tonePerformance(value) {
  var n = Number(value || 0);
  if (n >= 100000) return 'good';
  if (n >= 50000) return 'ok';
  return 'watch';
}

function fmtDate(value) {
  if (!value) return '-';
  var d = new Date(value);
  if (isNaN(d.getTime())) return value;
  return (d.getMonth() + 1) + '/' + d.getDate();
}

function num(value) {
  var n = Number(value || 0);
  return n.toLocaleString('ko-KR');
}

function compact(value) {
  var n = Number(value || 0);
  if (!n) return '-';
  if (n >= 100000000) return (n / 100000000).toFixed(1).replace(/\.0$/, '') + '억';
  if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, '') + '만';
  return n.toLocaleString('ko-KR');
}

function ratio(value) {
  var n = Number(value || 0);
  return n ? n.toFixed(2) : '-';
}

function pct(value) {
  var n = Number(value || 0);
  return n ? n.toFixed(2) + '%' : '-';
}

function esc(value) {
  var span = document.createElement('span');
  span.textContent = value == null ? '' : String(value);
  return span.innerHTML;
}
</script>
</body>
</html>
