<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>경쟁채널 - 운영 대시보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #F7F8FA; color: #111827; line-height: 1.45; }
    .topbar { height: 52px; background: #fff; border-bottom: 1px solid #10B981; display: flex; align-items: center; gap: 24px; padding: 0 24px; position: sticky; top: 0; z-index: 30; }
    .brand { color: #00A878; font-weight: 900; font-size: 20px; letter-spacing: 0; text-decoration: none; }
    .nav { display: flex; align-items: center; gap: 22px; color: #64748B; font-size: 14px; font-weight: 800; }
    .nav span:first-child { color: #00A878; border-bottom: 2px solid #00A878; height: 52px; display: flex; align-items: center; }
    .page { max-width: 1480px; margin: 0 auto; padding: 26px 24px 48px; }
    .back { display: inline-block; color: #64748B; text-decoration: none; font-size: 13px; margin-bottom: 14px; }
    .head { display: flex; justify-content: space-between; gap: 20px; align-items: flex-end; margin-bottom: 18px; }
    h1 { font-size: 23px; font-weight: 900; color: #0F172A; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #64748B; }
    .updated { font-size: 12px; color: #94A3B8; text-align: right; margin-bottom: 8px; }
    .guide { position: relative; text-align: right; }
    .guide button { border: 1px solid #E2E8F0; background: #fff; border-radius: 7px; padding: 6px 10px; color: #334155; font-size: 12px; font-weight: 800; cursor: pointer; }
    .guide-panel { display: none; position: absolute; right: 0; top: calc(100% + 6px); width: 320px; background: #fff; border: 1px solid #CBD5E1; border-radius: 8px; box-shadow: 0 14px 34px rgba(15,23,42,.14); padding: 12px; z-index: 50; text-align: left; }
    .guide.open .guide-panel { display: block; }
    .guide-title { font-size: 13px; font-weight: 900; margin-bottom: 6px; }
    .guide-line { font-size: 12px; color: #475569; margin-top: 5px; }
    .guide-line strong { color: #0F172A; }
    .summary { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 16px; }
    .summary-card { background: #fff; border: 1px solid #E2E8F0; border-radius: 8px; padding: 12px 14px; }
    .summary-label { font-size: 12px; color: #64748B; font-weight: 800; }
    .summary-value { font-size: 20px; color: #0F172A; font-weight: 900; margin-top: 2px; }
    .toolbar { background: #fff; border: 1px solid #E2E8F0; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
    .toolbar-main { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .search { display: flex; min-width: 280px; flex: 1; }
    .search input { width: 100%; height: 38px; border: 1px solid #CBD5E1; border-right: 0; border-radius: 7px 0 0 7px; padding: 0 12px; font-size: 14px; outline: none; }
    .search input:focus { border-color: #10B981; }
    .search button, .filter-toggle, .reset, .sort { height: 38px; border: 1px solid #10B981; background: #10B981; color: #fff; border-radius: 0 7px 7px 0; padding: 0 14px; font-size: 13px; font-weight: 850; cursor: pointer; }
    .filter-toggle { border-radius: 7px; }
    .reset { border-radius: 7px; border-color: #E2E8F0; background: #fff; color: #475569; }
    .sort { border-radius: 7px; border-color: #E2E8F0; background: #fff; color: #0F172A; min-width: 156px; }
    .filter-panel { display: none; border-top: 1px solid #E2E8F0; margin-top: 14px; padding-top: 14px; }
    .toolbar.open .filter-panel { display: block; }
    .filter-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }
    .filter-block { min-width: 0; }
    .filter-title { font-size: 13px; font-weight: 900; color: #0F172A; margin-bottom: 8px; display: flex; justify-content: space-between; gap: 8px; }
    .range-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .filter-block input, .filter-block select { height: 34px; border: 1px solid #E2E8F0; border-radius: 7px; padding: 0 9px; width: 100%; font-size: 13px; background: #fff; outline: none; }
    .chips { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 6px; }
    .chip { border: 1px solid #E2E8F0; background: #fff; border-radius: 7px; min-height: 42px; padding: 6px 4px; font-size: 12px; font-weight: 900; color: #94A3B8; cursor: pointer; }
    .chip small { display: block; font-size: 11px; font-weight: 750; color: #94A3B8; }
    .chip.active { border-color: #10B981; background: #ECFDF5; color: #059669; }
    .quick-dates { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-top: 8px; }
    .quick-dates button { height: 30px; border: 1px solid #E2E8F0; background: #fff; border-radius: 6px; font-size: 12px; color: #475569; cursor: pointer; }
    .quick-dates button.active { color: #059669; border-color: #10B981; background: #ECFDF5; font-weight: 850; }
    .result-meta { display: flex; justify-content: space-between; align-items: center; gap: 12px; color: #64748B; font-size: 13px; margin-bottom: 8px; }
    .table-wrap { background: #fff; border: 1px solid #E2E8F0; border-radius: 8px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th { background: #F1F5F9; border-bottom: 1px solid #E2E8F0; color: #334155; font-size: 13px; font-weight: 900; text-align: left; padding: 10px 12px; white-space: nowrap; }
    th.sortable { cursor: pointer; }
    td { border-bottom: 1px solid #E2E8F0; padding: 10px 12px; vertical-align: middle; font-size: 13px; }
    tr:last-child td { border-bottom: 0; }
    .col-rank { width: 54px; text-align: center; }
    .col-thumb { width: 126px; }
    .col-title { width: auto; }
    .col-num { width: 116px; text-align: right; }
    .col-grade { width: 104px; text-align: center; }
    .col-date { width: 92px; text-align: right; }
    .rank { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 5px; background: #F1F5F9; color: #475569; font-size: 12px; font-weight: 900; }
    .thumb { width: 104px; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 6px; background: #E2E8F0; display: block; }
    .title { color: #0F172A; text-decoration: none; font-size: 14px; font-weight: 850; line-height: 1.45; display: block; }
    .title:hover { color: #059669; }
    .source { color: #64748B; font-size: 12px; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .num { font-variant-numeric: tabular-nums; font-weight: 800; color: #0F172A; }
    .grade { font-size: 13px; font-weight: 950; line-height: 1.1; }
    .grade::before { content: "••••"; display: block; letter-spacing: 1px; font-size: 11px; line-height: 1; }
    .grade.great, .grade.good { color: #00A878; }
    .grade.normal { color: #A3A3A3; }
    .grade.bad, .grade.worst { color: #EF4444; }
    .empty { padding: 42px; text-align: center; color: #94A3B8; font-size: 14px; }
    .pager { display: flex; justify-content: center; gap: 8px; padding: 14px; border-top: 1px solid #E2E8F0; background: #fff; }
    .pager button { border: 1px solid #E2E8F0; background: #fff; border-radius: 7px; height: 34px; padding: 0 12px; cursor: pointer; color: #475569; font-weight: 800; }
    .pager button:disabled { opacity: .45; cursor: default; }
    @media (max-width: 980px) {
      .nav { display: none; }
      .head { display: block; }
      .summary, .filter-grid { grid-template-columns: 1fr; }
      .col-thumb, .hide-mobile { display: none; }
      th.col-thumb, td.col-thumb { display: none; }
      .col-num, .col-grade, .col-date { width: 86px; }
      .guide-panel { left: 0; right: auto; width: min(320px, calc(100vw - 48px)); }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="brand" href="../">▲viewtrap</a>
    <div class="nav">
      <span>영상 찾기</span>
      <span>채널 찾기</span>
      <span>채널 분석</span>
      <span>수집한 영상</span>
      <span>비즈니스 PT</span>
    </div>
  </div>
  <div class="page">
    <a href="../" class="back">&larr; 메인</a>
    <div class="head">
      <div>
        <h1>경쟁채널 모니터링</h1>
        <p class="subtitle">누적된 경쟁 영상에서 조회수, 기여도, 평균대비, 구독자대비로 검색합니다.</p>
      </div>
      <div>
        <div class="updated" id="updated">로딩 중...</div>
        <div class="guide" id="guide">
          <button type="button" id="guide-toggle">기준 보기</button>
          <div class="guide-panel">
            <div class="guide-title">지표 기준</div>
            <div class="guide-line"><strong>기여도/평균대비</strong>: 조회수 ÷ 해당 채널 최근 90일 평균 조회수</div>
            <div class="guide-line"><strong>구독자대비</strong>: 조회수 ÷ 구독자수</div>
            <div class="guide-line"><strong>성과도</strong>: 조회수 기준. Great 50만+, Good 10만+, Normal 5만+</div>
          </div>
        </div>
      </div>
    </div>
    <div id="app"><div class="empty">데이터 로딩 중...</div></div>
  </div>
<script>
var state = {
  data: null,
  filtered: [],
  page: 1,
  pageSize: 30,
  sort: 'contribution_desc',
  contributionGrades: new Set(),
  performanceGrades: new Set(),
  dateQuick: 'all'
};

fetch('../data/competitors/latest.json?v=' + Date.now())
  .then(function(r) { if (!r.ok) throw new Error('load failed'); return r.json(); })
  .then(function(data) {
    state.data = data;
    document.getElementById('updated').textContent = '업데이트 ' + fmtDate(data.updated_at);
    renderShell(data);
    applyFilters();
  })
  .catch(function() {
    document.getElementById('app').innerHTML = '<div class="empty">데이터를 불러오지 못했습니다.</div>';
    document.getElementById('updated').textContent = '';
  });

document.addEventListener('click', function(event) {
  var guide = document.getElementById('guide');
  var toggle = document.getElementById('guide-toggle');
  if (guide && toggle) {
    if (toggle.contains(event.target)) {
      guide.classList.toggle('open');
      return;
    }
    if (!guide.contains(event.target)) guide.classList.remove('open');
  }
});

function renderShell(data) {
  var s = data.summary || {};
  var html = '';
  html += '<div class="summary">';
  html += summaryCard('리포트 날짜', data.report_date || '-');
  html += summaryCard('전체 영상', compact(s.tracked_video_count));
  html += summaryCard('신규 영상', compact(s.new_video_count));
  html += summaryCard('채널', compact(s.channel_count));
  html += '</div>';
  html += '<div class="toolbar" id="toolbar">';
  html += '<div class="toolbar-main">';
  html += '<div class="search"><input id="q" placeholder="단어 또는 문장 입력"><button id="search-btn" type="button">검색</button></div>';
  html += '<button class="filter-toggle" id="filter-toggle" type="button">필터</button>';
  html += '<select class="sort" id="sort">';
  html += '<option value="contribution_desc">기여도 높은순</option>';
  html += '<option value="views_desc">조회수 높은순</option>';
  html += '<option value="subscriber_rate_desc">구독자대비 높은순</option>';
  html += '<option value="date_desc">게시일 최신순</option>';
  html += '<option value="daily_desc">24시간 상승순</option>';
  html += '</select>';
  html += '<button class="reset" id="reset" type="button">필터 전체 해제</button>';
  html += '</div>';
  html += '<div class="filter-panel">';
  html += '<div class="filter-grid">';
  html += rangeBlock('조회수 범위', 'views-min', 'views-max', '50,000', '1,000,000+');
  html += rangeBlock('평균대비 범위', 'avg-min', 'avg-max', '1', '10');
  html += rangeBlock('구독자대비 범위(%)', 'subrate-min', 'subrate-max', '10', '150');
  html += channelBlock(data.channels || []);
  html += dateBlock();
  html += gradeBlock('기여도', 'contribution');
  html += gradeBlock('성과도', 'performance');
  html += '<div class="filter-block"><div class="filter-title">티어</div><select id="tier"><option value="">전체</option><option value="1">1군</option><option value="2">2군</option></select></div>';
  html += '</div></div></div>';
  html += '<div class="result-meta"><div id="result-count">-</div><div id="active-summary"></div></div>';
  html += '<div class="table-wrap"><table><thead><tr>';
  html += '<th class="col-rank">선택</th><th class="col-thumb">썸네일</th><th class="col-title">제목</th>';
  html += '<th class="col-num sortable" data-sort="views_desc">조회수</th><th class="col-num sortable" data-sort="subscriber_desc">구독자</th>';
  html += '<th class="col-grade sortable" data-sort="contribution_desc">기여도</th><th class="col-grade sortable" data-sort="performance_desc">성과도</th>';
  html += '<th class="col-num sortable hide-mobile" data-sort="subscriber_rate_desc">구독자대비</th><th class="col-date sortable" data-sort="date_desc">게시일</th>';
  html += '</tr></thead><tbody id="results"></tbody></table><div class="pager" id="pager"></div></div>';
  document.getElementById('app').innerHTML = html;
  bindControls();
}

function summaryCard(label, value) {
  return '<div class="summary-card"><div class="summary-label">' + esc(label) + '</div><div class="summary-value">' + esc(value) + '</div></div>';
}

function rangeBlock(title, minId, maxId, minPlaceholder, maxPlaceholder) {
  return '<div class="filter-block"><div class="filter-title">' + esc(title) + '</div><div class="range-row"><input id="' + minId + '" placeholder="' + minPlaceholder + '"><input id="' + maxId + '" placeholder="' + maxPlaceholder + '"></div></div>';
}

function channelBlock(channels) {
  var html = '<div class="filter-block"><div class="filter-title">채널</div><select id="channel"><option value="">전체 채널</option>';
  channels.forEach(function(ch) { html += '<option value="' + esc(ch.name) + '">' + esc(ch.name) + '</option>'; });
  return html + '</select></div>';
}

function dateBlock() {
  var html = '<div class="filter-block"><div class="filter-title">영상 게시일</div><div class="range-row"><input id="date-start" type="date"><input id="date-end" type="date"></div>';
  html += '<div class="quick-dates" id="quick-dates">';
  [['7d','1주일'],['1m','1개월'],['3m','3개월'],['6m','6개월'],['12m','12개월'],['all','전체']].forEach(function(item) {
    html += '<button type="button" data-range="' + item[0] + '">' + item[1] + '</button>';
  });
  return html + '</div></div>';
}

function gradeBlock(title, kind) {
  var html = '<div class="filter-block"><div class="filter-title">' + esc(title) + '</div><div class="chips" data-kind="' + kind + '">';
  ['Worst','Bad','Normal','Good','Great'].forEach(function(label) {
    html += '<button class="chip" type="button" data-grade="' + label + '">••••<small>' + label + '</small></button>';
  });
  return html + '</div></div>';
}

function bindControls() {
  ['q','views-min','views-max','avg-min','avg-max','subrate-min','subrate-max','date-start','date-end','channel','tier'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', function() { state.page = 1; applyFilters(); });
  });
  document.getElementById('search-btn').addEventListener('click', function() { state.page = 1; applyFilters(); });
  document.getElementById('filter-toggle').addEventListener('click', function() { document.getElementById('toolbar').classList.toggle('open'); });
  document.getElementById('sort').addEventListener('change', function(e) { state.sort = e.target.value; state.page = 1; applyFilters(); });
  document.getElementById('reset').addEventListener('click', resetFilters);
  document.querySelectorAll('th.sortable').forEach(function(th) {
    th.addEventListener('click', function() {
      state.sort = th.dataset.sort;
      document.getElementById('sort').value = state.sort;
      state.page = 1;
      applyFilters();
    });
  });
  document.querySelectorAll('.chips .chip').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var set = btn.closest('.chips').dataset.kind === 'contribution' ? state.contributionGrades : state.performanceGrades;
      var grade = btn.dataset.grade;
      if (set.has(grade)) set.delete(grade); else set.add(grade);
      btn.classList.toggle('active');
      state.page = 1;
      applyFilters();
    });
  });
  document.querySelectorAll('#quick-dates button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      state.dateQuick = btn.dataset.range;
      setQuickDate(state.dateQuick);
      document.querySelectorAll('#quick-dates button').forEach(function(b) { b.classList.toggle('active', b === btn); });
      state.page = 1;
      applyFilters();
    });
  });
  document.querySelector('#quick-dates button[data-range="all"]').classList.add('active');
}

function applyFilters() {
  var rows = (state.data.videos || []).slice();
  var q = document.getElementById('q').value.trim().toLowerCase();
  var channel = document.getElementById('channel').value;
  var tier = document.getElementById('tier').value;
  var minViews = parseLooseNumber(document.getElementById('views-min').value);
  var maxViews = parseLooseNumber(document.getElementById('views-max').value);
  var minAvg = parseFloat(document.getElementById('avg-min').value) || null;
  var maxAvg = parseFloat(document.getElementById('avg-max').value) || null;
  var minSub = parseFloat(document.getElementById('subrate-min').value) || null;
  var maxSub = parseFloat(document.getElementById('subrate-max').value) || null;
  var dateStart = document.getElementById('date-start').value;
  var dateEnd = document.getElementById('date-end').value;

  rows = rows.filter(function(row) {
    var hay = (row.title + ' ' + row.channel_name).toLowerCase();
    if (q && hay.indexOf(q) === -1) return false;
    if (channel && row.channel_name !== channel) return false;
    if (tier && String(row.tier) !== tier) return false;
    if (minViews !== null && (row.view_count || 0) < minViews) return false;
    if (maxViews !== null && (row.view_count || 0) > maxViews) return false;
    if (minAvg !== null && (row.contribution_score || 0) < minAvg) return false;
    if (maxAvg !== null && (row.contribution_score || 0) > maxAvg) return false;
    if (minSub !== null && (row.subscriber_view_rate_pct || 0) < minSub) return false;
    if (maxSub !== null && (row.subscriber_view_rate_pct || 0) > maxSub) return false;
    var published = (row.published_at || '').slice(0, 10);
    if (dateStart && published < dateStart) return false;
    if (dateEnd && published > dateEnd) return false;
    if (state.contributionGrades.size && !state.contributionGrades.has(gradeContribution(row.contribution_score))) return false;
    if (state.performanceGrades.size && !state.performanceGrades.has(gradePerformance(row.view_count))) return false;
    return true;
  });

  rows.sort(sorter(state.sort));
  state.filtered = rows;
  renderRows();
}

function renderRows() {
  var tbody = document.getElementById('results');
  var start = (state.page - 1) * state.pageSize;
  var pageRows = state.filtered.slice(start, start + state.pageSize);
  document.getElementById('result-count').textContent = '필터 결과 ' + compact(state.filtered.length) + '개 확인';
  document.getElementById('active-summary').textContent = '정렬: ' + document.getElementById('sort').selectedOptions[0].textContent;
  if (!pageRows.length) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty">조건에 맞는 영상이 없습니다.</div></td></tr>';
    renderPager();
    return;
  }
  var html = '';
  pageRows.forEach(function(row, idx) {
    var contributionGrade = gradeContribution(row.contribution_score);
    var performanceGrade = gradePerformance(row.view_count);
    html += '<tr>';
    html += '<td class="col-rank"><span class="rank">' + (start + idx + 1) + '</span></td>';
    html += '<td class="col-thumb">' + thumbnail(row) + '</td>';
    html += '<td class="col-title"><a class="title" href="' + esc(row.url) + '" target="_blank" rel="noopener">' + esc(row.title) + '</a><div class="source">' + esc(row.channel_name) + ' · 평균대비 ' + ratio(row.contribution_score) + '배 · 구독자대비 ' + pct(row.subscriber_view_rate_pct) + '</div></td>';
    html += '<td class="col-num"><span class="num">' + compact(row.view_count) + '</span></td>';
    html += '<td class="col-num"><span class="num">' + compact(row.subscriber_count) + '</span></td>';
    html += '<td class="col-grade"><span class="grade ' + contributionGrade.toLowerCase() + '">' + contributionGrade + '</span></td>';
    html += '<td class="col-grade"><span class="grade ' + performanceGrade.toLowerCase() + '">' + performanceGrade + '</span></td>';
    html += '<td class="col-num hide-mobile"><span class="num">' + pct(row.subscriber_view_rate_pct) + '</span></td>';
    html += '<td class="col-date">' + fmtDate(row.published_at) + '</td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;
  renderPager();
}

function thumbnail(row) {
  if (!row.thumbnail_url) return '<div class="thumb"></div>';
  return '<img class="thumb" src="' + esc(row.thumbnail_url) + '" alt="">';
}

function renderPager() {
  var pages = Math.max(1, Math.ceil(state.filtered.length / state.pageSize));
  var html = '<button type="button" ' + (state.page <= 1 ? 'disabled' : '') + ' id="prev-page">이전</button>';
  html += '<button type="button" disabled>' + state.page + ' / ' + pages + '</button>';
  html += '<button type="button" ' + (state.page >= pages ? 'disabled' : '') + ' id="next-page">다음</button>';
  document.getElementById('pager').innerHTML = html;
  var prev = document.getElementById('prev-page');
  var next = document.getElementById('next-page');
  if (prev) prev.addEventListener('click', function() { state.page--; renderRows(); });
  if (next) next.addEventListener('click', function() { state.page++; renderRows(); });
}

function resetFilters() {
  ['q','views-min','views-max','avg-min','avg-max','subrate-min','subrate-max','date-start','date-end'].forEach(function(id) { document.getElementById(id).value = ''; });
  document.getElementById('channel').value = '';
  document.getElementById('tier').value = '';
  state.contributionGrades.clear();
  state.performanceGrades.clear();
  state.dateQuick = 'all';
  document.querySelectorAll('.chip').forEach(function(btn) { btn.classList.remove('active'); });
  document.querySelectorAll('#quick-dates button').forEach(function(btn) { btn.classList.toggle('active', btn.dataset.range === 'all'); });
  state.sort = 'contribution_desc';
  document.getElementById('sort').value = state.sort;
  state.page = 1;
  applyFilters();
}

function setQuickDate(range) {
  var start = document.getElementById('date-start');
  var end = document.getElementById('date-end');
  if (range === 'all') {
    start.value = '';
    end.value = '';
    return;
  }
  var now = new Date();
  var from = new Date(now);
  if (range === '7d') from.setDate(now.getDate() - 7);
  if (range === '1m') from.setMonth(now.getMonth() - 1);
  if (range === '3m') from.setMonth(now.getMonth() - 3);
  if (range === '6m') from.setMonth(now.getMonth() - 6);
  if (range === '12m') from.setMonth(now.getMonth() - 12);
  start.value = toDateInput(from);
  end.value = toDateInput(now);
}

function sorter(mode) {
  var map = {
    contribution_desc: function(a, b) { return compare(b.contribution_score, a.contribution_score) || compare(b.view_count, a.view_count); },
    views_desc: function(a, b) { return compare(b.view_count, a.view_count); },
    subscriber_desc: function(a, b) { return compare(b.subscriber_count, a.subscriber_count); },
    subscriber_rate_desc: function(a, b) { return compare(b.subscriber_view_rate_pct, a.subscriber_view_rate_pct); },
    performance_desc: function(a, b) { return compare(performanceValue(b.view_count), performanceValue(a.view_count)) || compare(b.view_count, a.view_count); },
    date_desc: function(a, b) { return String(b.published_at).localeCompare(String(a.published_at)); },
    daily_desc: function(a, b) { return compare(b.daily_delta, a.daily_delta); }
  };
  return map[mode] || map.contribution_desc;
}

function compare(a, b) {
  return (Number(a || 0) - Number(b || 0));
}

function parseLooseNumber(value) {
  if (!value.trim()) return null;
  var text = value.replace(/[,+]/g, '').trim();
  if (text.endsWith('만')) return parseFloat(text) * 10000;
  if (text.endsWith('억')) return parseFloat(text) * 100000000;
  var number = Number(text);
  return Number.isFinite(number) ? number : null;
}

function gradeContribution(value) {
  var n = Number(value || 0);
  if (n >= 5) return 'Great';
  if (n >= 2) return 'Good';
  if (n >= 1) return 'Normal';
  if (n >= 0.5) return 'Bad';
  return 'Worst';
}

function gradePerformance(value) {
  var n = Number(value || 0);
  if (n >= 500000) return 'Great';
  if (n >= 100000) return 'Good';
  if (n >= 50000) return 'Normal';
  if (n >= 10000) return 'Bad';
  return 'Worst';
}

function performanceValue(value) {
  return ['Worst','Bad','Normal','Good','Great'].indexOf(gradePerformance(value));
}

function fmtDate(value) {
  if (!value) return '-';
  var d = new Date(value);
  if (isNaN(d.getTime())) return String(value).slice(2, 10).replace(/-/g, '.');
  return String(d.getFullYear()).slice(2) + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0');
}

function toDateInput(date) {
  return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
}

function compact(value) {
  var n = Number(value || 0);
  if (!n) return '-';
  if (n >= 100000000) return (n / 100000000).toFixed(1).replace(/\.0$/, '') + '억';
  if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, '') + '만';
  return n.toLocaleString('ko-KR');
}

function ratio(value) {
  var n = Number(value || 0);
  return n ? n.toFixed(2) : '-';
}

function pct(value) {
  var n = Number(value || 0);
  return n ? n.toFixed(2) + '%' : '-';
}

function esc(value) {
  var span = document.createElement('span');
  span.textContent = value == null ? '' : String(value);
  return span.innerHTML;
}
</script>
