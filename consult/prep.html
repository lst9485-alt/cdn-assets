<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <title>재무 계산기 - 내집마련 코칭</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
    <style>
        :root {
            --navy: #051C2C;
            --blue: #0077C8;
            --blue-light: #E8F3FF;
            --green: #059669;
            --green-light: #ECFDF5;
            --yellow: #F59E0B;
            --red: #EF4444;
            --purple: #8B5CF6;
            --text: #1A1A1A;
            --text2: #555;
            --text3: #888;
            --border: #E2E8F0;
            --bg: #F8FAFC;
            --card: #fff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:"Pretendard",-apple-system,BlinkMacSystemFont,system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; -webkit-font-smoothing:antialiased; }

        .wrap { max-width:920px; margin:0 auto; padding:20px 20px 40px; }

        /* 헤더 */
        .page-header { background:linear-gradient(135deg,var(--navy),#0A2F47); color:#fff; padding:24px 32px; border-radius:14px; margin-bottom:20px; }
        .page-header h1 { font-size:20px; font-weight:700; }
        .page-header .sub { font-size:13px; opacity:.8; margin-top:2px; }

        /* 탭 */
        .tabs { display:flex; gap:4px; background:#fff; border:1px solid var(--border); border-radius:10px; padding:4px; margin-bottom:20px; overflow-x:auto; }
        .tab { flex:1; padding:10px 8px; text-align:center; font-size:13px; font-weight:600; color:var(--text3); border-radius:8px; cursor:pointer; transition:all .15s; white-space:nowrap; border:none; background:none; }
        .tab:hover { color:var(--text); background:#F1F5F9; }
        .tab.active { background:var(--blue); color:#fff; }

        .tab-content { display:none; }
        .tab-content.active { display:block; }

        /* 카드 */
        .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:16px; }
        .card-title { font-size:15px; font-weight:700; color:var(--navy); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
        .card-title::before { content:''; width:4px; height:16px; background:var(--blue); border-radius:2px; }

        /* 입력 그리드 */
        .input-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .input-group { display:flex; flex-direction:column; gap:4px; }
        .input-label { font-size:12px; font-weight:600; color:var(--text3); }
        .input-field { border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:15px; font-weight:600; color:var(--navy); font-family:inherit; outline:none; width:100%; transition:border-color .15s; }
        .input-field:focus { border-color:var(--blue); }
        .input-unit { font-size:11px; color:var(--text3); margin-top:2px; }

        /* 결과 카드 */
        .result-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:20px; }
        .result-card { background:var(--bg); border-radius:10px; padding:16px; text-align:center; }
        .result-label { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
        .result-value { font-size:26px; font-weight:800; color:var(--navy); }
        .result-value.blue { color:var(--blue); }
        .result-value.green { color:var(--green); }
        .result-value.red { color:var(--red); }
        .result-sub { font-size:11px; color:var(--text3); margin-top:2px; }

        /* 차트 */
        .chart-wrap { position:relative; margin-top:8px; }
        .chart-wrap canvas { max-height:320px; }

        /* 안내 박스 */
        .note { background:#FFFBEB; border:1px solid #FDE68A; border-radius:8px; padding:12px 14px; font-size:12px; color:#92400E; line-height:1.7; margin-top:12px; }
        .note strong { color:#78350F; }

        /* 교차점 하이라이트 */
        .highlight-box { background:var(--blue-light); border:2px solid var(--blue); border-radius:10px; padding:16px 20px; text-align:center; margin-top:12px; }
        .highlight-box .big { font-size:28px; font-weight:800; color:var(--blue); }
        .highlight-box .desc { font-size:13px; color:var(--text2); margin-top:4px; }

        /* 푸터 */
        .page-footer { text-align:center; font-size:11px; color:var(--text3); padding:16px; }

        @media (max-width:768px) {
            .wrap { padding:12px; }
            .page-header { padding:18px 20px; border-radius:10px; }
            .tabs { gap:2px; padding:3px; }
            .tab { padding:8px 6px; font-size:12px; }
            .input-grid { grid-template-columns:1fr; }
            .result-row { grid-template-columns:1fr 1fr; }
            .result-value { font-size:22px; }
            .card { padding:18px 16px; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="page-header">
        <h1 id="headerTitle">재무 계산기</h1>
        <div class="sub" id="headerSub">내집마련 코칭 · 상담 준비 자료</div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="loan">대출/예산</button>
        <button class="tab" data-tab="repay">월 상환액</button>
        <button class="tab" data-tab="saving">저축 시뮬</button>
        <button class="tab" data-tab="upgrade">갈아타기</button>
    </div>

    <!-- ==================== TAB 1: 대출/예산 ==================== -->
    <div class="tab-content active" id="tab-loan">
        <div class="card">
            <div class="card-title">자산 및 소득 입력</div>
            <div class="input-grid">
                <div class="input-group">
                    <label class="input-label">보유 현금</label>
                    <input class="input-field" type="number" id="l_cash" value="18000">
                    <span class="input-unit">만원</span>
                </div>
                <div class="input-group">
                    <label class="input-label">부동산 자산</label>
                    <input class="input-field" type="number" id="l_estate" value="0">
                    <span class="input-unit">만원</span>
                </div>
                <div class="input-group">
                    <label class="input-label">기타 자산</label>
                    <input class="input-field" type="number" id="l_other" value="0">
                    <span class="input-unit">만원</span>
                </div>
                <div class="input-group">
                    <label class="input-label">기존 대출</label>
                    <input class="input-field" type="number" id="l_debt" value="0">
                    <span class="input-unit">만원</span>
                </div>
                <div class="input-group">
                    <label class="input-label">연소득 (세후)</label>
                    <input class="input-field" type="number" id="l_income" value="7700">
                    <span class="input-unit">만원</span>
                </div>
                <div class="input-group">
                    <label class="input-label">희망 아파트 가격</label>
                    <input class="input-field" type="number" id="l_target" value="60000">
                    <span class="input-unit">만원</span>
                </div>
                <div class="input-group">
                    <label class="input-label">대출 금리</label>
                    <input class="input-field" type="number" id="l_rate" value="4.5" step="0.1">
                    <span class="input-unit">%</span>
                </div>
                <div class="input-group">
                    <label class="input-label">대출 기간</label>
                    <input class="input-field" type="number" id="l_years" value="30">
                    <span class="input-unit">년</span>
                </div>
            </div>
        </div>

        <div class="result-row" id="loanResults"></div>

        <div class="card">
            <div class="card-title">매수 가능 분석</div>
            <div class="chart-wrap"><canvas id="chartLoan"></canvas></div>
            <div class="note" id="loanNote"></div>
        </div>
    </div>

    <!-- ==================== TAB 2: 월 상환액 ==================== -->
    <div class="tab-content" id="tab-repay">
        <div class="card">
            <div class="card-title">대출 조건 입력</div>
            <div class="input-grid">
                <div class="input-group">
                    <label class="input-label">대출 금액</label>
                    <input class="input-field" type="number" id="r_amount" value="40000">
                    <span class="input-unit">만원</span>
                </div>
                <div class="input-group">
                    <label class="input-label">대출 기간</label>
                    <input class="input-field" type="number" id="r_months" value="360">
                    <span class="input-unit">개월</span>
                </div>
                <div class="input-group">
                    <label class="input-label">금리</label>
                    <input class="input-field" type="number" id="r_rate" value="4.3" step="0.1">
                    <span class="input-unit">%</span>
                </div>
            </div>
        </div>

        <div class="result-row" id="repayResults"></div>

        <div class="card">
            <div class="card-title">원금 vs 이자</div>
            <div class="chart-wrap" style="max-width:280px;margin:0 auto;"><canvas id="chartRepay"></canvas></div>
        </div>
    </div>

    <!-- ==================== TAB 3: 저축 시뮬 ==================== -->
    <div class="tab-content" id="tab-saving">
        <div class="card">
            <div class="card-title">저축 조건 입력</div>
            <div class="input-grid">
                <div class="input-group">
                    <label class="input-label">현재 모은 돈</label>
                    <input class="input-field" type="number" id="s_current" value="18000">
                    <span class="input-unit">만원</span>
                </div>
                <div class="input-group">
                    <label class="input-label">연 저축액</label>
                    <input class="input-field" type="number" id="s_annual" value="2400">
                    <span class="input-unit">만원</span>
                </div>
                <div class="input-group">
                    <label class="input-label">투자 수익률</label>
                    <input class="input-field" type="number" id="s_return" value="5" step="0.5">
                    <span class="input-unit">%</span>
                </div>
                <div class="input-group">
                    <label class="input-label">목표 금액</label>
                    <input class="input-field" type="number" id="s_goal" value="30000">
                    <span class="input-unit">만원</span>
                </div>
                <div class="input-group">
                    <label class="input-label">시뮬레이션 기간</label>
                    <input class="input-field" type="number" id="s_years" value="10">
                    <span class="input-unit">년</span>
                </div>
            </div>
        </div>

        <div class="highlight-box" id="savingHighlight"></div>

        <div class="card" style="margin-top:16px;">
            <div class="card-title">누적 자산 추이</div>
            <div class="chart-wrap"><canvas id="chartSaving"></canvas></div>
        </div>
    </div>

    <!-- ==================== TAB 4: 갈아타기 ==================== -->
    <div class="tab-content" id="tab-upgrade">
        <div class="card">
            <div class="card-title">갈아타기 조건 입력</div>
            <div class="input-grid">
                <div class="input-group">
                    <label class="input-label">내 단지 현재가</label>
                    <input class="input-field" type="number" id="u_my" value="50000">
                    <span class="input-unit">만원 (이번에 살 단지)</span>
                </div>
                <div class="input-group">
                    <label class="input-label">내 단지 연 상승률</label>
                    <input class="input-field" type="number" id="u_myRate" value="3" step="0.5">
                    <span class="input-unit">%</span>
                </div>
                <div class="input-group">
                    <label class="input-label">목표 단지 현재가</label>
                    <input class="input-field" type="number" id="u_goal" value="130000">
                    <span class="input-unit">만원</span>
                </div>
                <div class="input-group">
                    <label class="input-label">목표 단지 연 상승률</label>
                    <input class="input-field" type="number" id="u_goalRate" value="5" step="0.5">
                    <span class="input-unit">%</span>
                </div>
                <div class="input-group">
                    <label class="input-label">연 저축액</label>
                    <input class="input-field" type="number" id="u_saving" value="2400">
                    <span class="input-unit">만원</span>
                </div>
                <div class="input-group">
                    <label class="input-label">투자 수익률</label>
                    <input class="input-field" type="number" id="u_return" value="5" step="0.5">
                    <span class="input-unit">%</span>
                </div>
                <div class="input-group">
                    <label class="input-label">대출 가능액</label>
                    <input class="input-field" type="number" id="u_loan" value="40000">
                    <span class="input-unit">만원</span>
                </div>
                <div class="input-group">
                    <label class="input-label">시뮬레이션 기간</label>
                    <input class="input-field" type="number" id="u_years" value="10">
                    <span class="input-unit">년</span>
                </div>
            </div>
        </div>

        <div class="highlight-box" id="upgradeHighlight"></div>

        <div class="card" style="margin-top:16px;">
            <div class="card-title">갈아타기 시뮬레이션</div>
            <div class="chart-wrap"><canvas id="chartUpgrade"></canvas></div>
        </div>
    </div>
</div>

<div class="page-footer">상담 준비용 내부 자료 · 우리동네재테크</div>

<script>
(function(){
    // ─── 유틸 ───
    function $(id){ return document.getElementById(id); }
    function val(id){ return Number($(id).value)||0; }
    function fmt(v){
        if(v>=10000) return (v/10000).toFixed(1).replace(/\.0$/,'')+'억';
        if(v>=1000) return Math.round(v/1000)+'천만';
        return v.toLocaleString()+'만';
    }
    function fmtFull(v){ return Math.round(v).toLocaleString()+'만원'; }
    function getP(n,d){ var r=new RegExp('[?&]'+n+'=([^&#]*)'); var m=r.exec(location.search); return m?decodeURIComponent(m[1]):d; }
    function getN(n,d){ var v=getP(n,''); return v?Number(v):d; }

    // PMT 계산: 월 원리금 균등 상환
    function pmt(principal, annualRate, months){
        if(annualRate===0) return principal/months;
        var r=annualRate/12/100;
        var p=Math.pow(1+r,months);
        return principal*r*p/(p-1);
    }

    // ─── URL → 기본값 ───
    var name=getP('name','');
    if(name){ $('headerTitle').textContent=name+'님 재무 계산기'; }

    var defaults={
        cash:getN('cash',18000), estate:getN('estate',0), other:getN('other',0),
        debt:getN('debt',0), income:getN('income',7700), saving:getN('saving',2400),
        target:getN('target',60000), loan_want:getN('loan_want',47000),
        my_apt:getN('my_apt',50000), goal_apt:getN('goal_apt',130000)
    };
    $('l_cash').value=defaults.cash; $('l_estate').value=defaults.estate;
    $('l_other').value=defaults.other; $('l_debt').value=defaults.debt;
    $('l_income').value=defaults.income; $('l_target').value=defaults.target;
    $('s_current').value=defaults.cash; $('s_annual').value=defaults.saving;
    $('u_my').value=defaults.my_apt; $('u_goal').value=defaults.goal_apt;
    $('u_saving').value=defaults.saving;

    // ─── 탭 전환 ───
    document.querySelectorAll('.tab').forEach(function(t){
        t.addEventListener('click',function(){
            document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
            document.querySelectorAll('.tab-content').forEach(function(x){x.classList.remove('active');});
            t.classList.add('active');
            $('tab-'+t.dataset.tab).classList.add('active');
        });
    });

    // ─── Chart 인스턴스 ───
    var chartLoan=null, chartRepay=null, chartSaving=null, chartUpgrade=null;

    // ==================== TAB 1 ====================
    function renderLoan(){
        var cash=val('l_cash'), estate=val('l_estate'), other=val('l_other'),
            debt=val('l_debt'), income=val('l_income'), target=val('l_target'),
            rate=val('l_rate'), years=val('l_years');

        var totalAsset=cash+estate+other;
        var netWorth=totalAsset-debt;
        var months=years*12;

        // DSR
        var annualRepay=income*0.4;
        var monthlyRepay=annualRepay/12;
        var maxLoan=Math.round(pmt(1,rate,months)>0 ? monthlyRepay/pmt(1,rate,months) : 0);

        // LTV
        var maxAptLTV=Math.round(maxLoan/0.7);
        var buyingPower=cash+maxLoan;
        var gap=target-buyingPower;

        // 결과 카드
        $('loanResults').innerHTML=''
            +'<div class="result-card"><div class="result-label">순자산</div><div class="result-value green">'+fmt(netWorth)+'</div></div>'
            +'<div class="result-card"><div class="result-label">DSR 최대 대출</div><div class="result-value blue">'+fmt(maxLoan)+'</div><div class="result-sub">월 상환 '+fmtFull(Math.round(monthlyRepay))+'</div></div>'
            +'<div class="result-card"><div class="result-label">LTV 최대 매수가</div><div class="result-value blue">'+fmt(maxAptLTV)+'</div><div class="result-sub">LTV 70% 기준</div></div>'
            +'<div class="result-card"><div class="result-label">총 매수력</div><div class="result-value '+(gap>0?'red':'green')+'">'+fmt(buyingPower)+'</div><div class="result-sub">현금+최대대출</div></div>';

        // 차트
        var maxVal=Math.max(maxAptLTV,target,buyingPower)*1.15;
        if(chartLoan) chartLoan.destroy();
        chartLoan=new Chart($('chartLoan'),{
            type:'bar',
            data:{
                labels:['총 매수력\n(현금+대출)','희망 가격'],
                datasets:[{
                    data:[buyingPower,target],
                    backgroundColor:[buyingPower>=target?'#059669':'#0077C8','#F59E0B'],
                    borderRadius:6,
                    barPercentage:.5,
                }]
            },
            options:{
                indexAxis:'y',
                responsive:true,
                maintainAspectRatio:false,
                plugins:{
                    legend:{display:false},
                    annotation:{
                        annotations:{
                            dsrLine:{type:'line',xMin:maxLoan,xMax:maxLoan,borderColor:'#0077C8',borderWidth:2,borderDash:[6,4],
                                label:{display:true,content:'DSR 최대대출 '+fmt(maxLoan),position:'start',backgroundColor:'#0077C8',font:{size:11}}},
                            ltvLine:{type:'line',xMin:maxAptLTV,xMax:maxAptLTV,borderColor:'#8B5CF6',borderWidth:2,borderDash:[6,4],
                                label:{display:true,content:'LTV 최대매수 '+fmt(maxAptLTV),position:'end',backgroundColor:'#8B5CF6',font:{size:11}}}
                        }
                    }
                },
                scales:{
                    x:{max:maxVal,ticks:{callback:function(v){return fmt(v);}},grid:{color:'#F1F5F9'}},
                    y:{grid:{display:false},ticks:{font:{size:13,weight:'bold'}}}
                }
            },
            plugins:[{id:'barLabel',afterDatasetsDraw:function(c){
                var meta=c.getDatasetMeta(0);
                meta.data.forEach(function(bar,i){
                    c.ctx.fillStyle='#fff'; c.ctx.font='bold 13px Pretendard';
                    c.ctx.textAlign='right'; c.ctx.textBaseline='middle';
                    var v=c.data.datasets[0].data[i];
                    if(bar.width>60) c.ctx.fillText(fmt(v),bar.x-8,bar.y);
                });
            }}]
        });
        $('chartLoan').parentElement.style.height='160px';

        // 안내
        var noteHtml='<strong>계산 기준:</strong> DSR 40%, 금리 '+rate+'%, '+years+'년 원리금균등<br>';
        if(gap>0) noteHtml+='<strong style="color:#DC2626">부족:</strong> 희망 가격 대비 '+fmt(gap)+' 부족';
        else noteHtml+='<strong style="color:#059669">여유:</strong> 희망 가격 대비 '+fmt(Math.abs(gap))+' 여유';
        noteHtml+='<br><br><strong>정책대출 참고:</strong> 디딤돌(소득 6천↓), 보금자리론(소득 7천↓), 신생아특례(2년내 출산, 맞벌이 2억↓)';
        $('loanNote').innerHTML=noteHtml;
    }

    // ==================== TAB 2 ====================
    function renderRepay(){
        var amount=val('r_amount'), months=val('r_months'), rate=val('r_rate');
        var monthly=Math.round(pmt(amount,rate,months));
        var totalPay=monthly*months;
        var totalInterest=totalPay-amount;

        $('repayResults').innerHTML=''
            +'<div class="result-card"><div class="result-label">월 상환액</div><div class="result-value blue">'+fmtFull(monthly)+'</div></div>'
            +'<div class="result-card"><div class="result-label">총 이자</div><div class="result-value red">'+fmt(totalInterest)+'</div></div>'
            +'<div class="result-card"><div class="result-label">총 상환액</div><div class="result-value">'+fmt(totalPay)+'</div><div class="result-sub">원금 '+fmt(amount)+' + 이자</div></div>';

        if(chartRepay) chartRepay.destroy();
        chartRepay=new Chart($('chartRepay'),{
            type:'doughnut',
            data:{
                labels:['원금','이자'],
                datasets:[{data:[amount,Math.max(totalInterest,0)],backgroundColor:['#0077C8','#EF4444'],borderWidth:2,borderColor:'#fff'}]
            },
            options:{
                responsive:true,
                cutout:'65%',
                plugins:{
                    legend:{position:'bottom',labels:{usePointStyle:true,padding:12,font:{size:13}}},
                    tooltip:{callbacks:{label:function(ctx){return ctx.label+': '+fmt(ctx.parsed);}}}
                }
            }
        });
    }

    // ==================== TAB 3 ====================
    function renderSaving(){
        var current=val('s_current'), annual=val('s_annual'), ret=val('s_return')/100,
            goal=val('s_goal'), years=val('s_years');

        var labels=[], data=[], reachYear=null;
        for(var y=0;y<=years;y++){
            labels.push(y===0?'현재':y+'년후');
            // 복리: 기존자산*(1+r)^y + 매년저축 누적 (각 연도 복리)
            var accumulated=current*Math.pow(1+ret,y);
            for(var j=0;j<y;j++) accumulated+=annual*Math.pow(1+ret,y-1-j);
            data.push(Math.round(accumulated));
            if(reachYear===null && accumulated>=goal && goal>0) reachYear=y;
        }

        if(reachYear!==null){
            $('savingHighlight').innerHTML='<div class="big">'+reachYear+'년 후 달성</div><div class="desc">목표 '+fmt(goal)+' 도달 (수익률 '+(ret*100)+'% 복리)</div>';
            $('savingHighlight').style.display='';
        } else {
            $('savingHighlight').innerHTML='<div class="big">'+years+'년 내 미달성</div><div class="desc">'+years+'년 후 '+fmt(data[data.length-1])+' (목표 '+fmt(goal)+')</div>';
            $('savingHighlight').style.borderColor=var_red='#EF4444';
            $('savingHighlight').style.background='#FEF2F2';
            $('savingHighlight').querySelector('.big').style.color='#EF4444';
        }

        if(chartSaving) chartSaving.destroy();
        chartSaving=new Chart($('chartSaving'),{
            type:'line',
            data:{
                labels:labels,
                datasets:[
                    {label:'누적 자산',data:data,borderColor:'#0077C8',backgroundColor:'rgba(0,119,200,.06)',fill:true,tension:.3,pointRadius:4,pointBackgroundColor:'#0077C8',borderWidth:2.5},
                    {label:'목표 '+fmt(goal),data:Array(years+1).fill(goal),borderColor:'#EF4444',borderDash:[8,4],borderWidth:2,pointRadius:0,fill:false}
                ]
            },
            options:{
                responsive:true,
                maintainAspectRatio:false,
                interaction:{intersect:false,mode:'index'},
                plugins:{
                    legend:{position:'bottom',labels:{usePointStyle:true,padding:14,font:{size:12}}},
                    tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+fmt(ctx.parsed.y);}}}
                },
                scales:{
                    y:{beginAtZero:true,ticks:{callback:function(v){return fmt(v);}},grid:{color:'#F1F5F9'}},
                    x:{grid:{display:false}}
                }
            }
        });
        $('chartSaving').parentElement.style.height='300px';
    }

    // ==================== TAB 4 ====================
    function renderUpgrade(){
        var myApt=val('u_my'), myRate=val('u_myRate')/100,
            goalApt=val('u_goal'), goalRate=val('u_goalRate')/100,
            saving=val('u_saving'), ret=val('u_return')/100,
            loanAvail=val('u_loan'), years=val('u_years');

        var labels=[], myData=[], goalData=[], netData=[];
        var crossYear=null;
        var thisYear=new Date().getFullYear();

        for(var y=0;y<=years;y++){
            labels.push(String(thisYear+y));
            var myVal=myApt*Math.pow(1+myRate,y);
            var goalVal=goalApt*Math.pow(1+goalRate,y);

            // 순자산 = 내 단지 가치 + 누적저축(복리) + 대출가능액
            var accumulated=0;
            for(var j=0;j<y;j++) accumulated+=saving*Math.pow(1+ret,y-1-j);
            var netWorth=myVal+accumulated+loanAvail;

            myData.push(Math.round(myVal));
            goalData.push(Math.round(goalVal));
            netData.push(Math.round(netWorth));

            if(crossYear===null && netWorth>=goalVal && y>0) crossYear=y;
        }

        if(crossYear!==null){
            $('upgradeHighlight').innerHTML='<div class="big">'+(thisYear+crossYear)+'년 ('+crossYear+'년 후)</div><div class="desc">순자산이 목표 단지 가격에 도달하는 시점</div>';
            $('upgradeHighlight').style.display='';
            $('upgradeHighlight').style.background='var(--blue-light)';
            $('upgradeHighlight').style.borderColor='var(--blue)';
            $('upgradeHighlight').querySelector('.big').style.color='var(--blue)';
        } else {
            $('upgradeHighlight').innerHTML='<div class="big">'+years+'년 내 미도달</div><div class="desc">'+years+'년 후 순자산 '+fmt(netData[netData.length-1])+' / 목표 '+fmt(goalData[goalData.length-1])+'</div>';
            $('upgradeHighlight').style.display='';
            $('upgradeHighlight').style.background='#FEF2F2';
            $('upgradeHighlight').style.borderColor='#EF4444';
            $('upgradeHighlight').querySelector('.big').style.color='#EF4444';
        }

        if(chartUpgrade) chartUpgrade.destroy();
        var annotations={};
        if(crossYear!==null){
            annotations.crossPoint={
                type:'point',xValue:String(thisYear+crossYear),yValue:goalData[crossYear],
                backgroundColor:'#0077C8',borderColor:'#fff',borderWidth:3,radius:8
            };
            annotations.crossLabel={
                type:'label',xValue:String(thisYear+crossYear),yValue:goalData[crossYear],
                content:['갈아타기 가능!'],font:{size:12,weight:'bold'},
                backgroundColor:'rgba(0,119,200,.9)',color:'#fff',padding:6,borderRadius:4,
                yAdjust:-24
            };
        }

        chartUpgrade=new Chart($('chartUpgrade'),{
            type:'line',
            data:{
                labels:labels,
                datasets:[
                    {label:'내 단지',data:myData,borderColor:'#94A3B8',backgroundColor:'rgba(148,163,184,.05)',fill:false,tension:.3,borderWidth:2,pointRadius:3,pointBackgroundColor:'#94A3B8'},
                    {label:'목표 단지',data:goalData,borderColor:'#EF4444',backgroundColor:'rgba(239,68,68,.05)',fill:false,tension:.3,borderWidth:2.5,pointRadius:3,pointBackgroundColor:'#EF4444'},
                    {label:'순자산',data:netData,borderColor:'#0077C8',backgroundColor:'rgba(0,119,200,.06)',fill:true,tension:.3,borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#0077C8'}
                ]
            },
            options:{
                responsive:true,
                maintainAspectRatio:false,
                interaction:{intersect:false,mode:'index'},
                plugins:{
                    legend:{position:'bottom',labels:{usePointStyle:true,padding:14,font:{size:12}}},
                    tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+fmt(ctx.parsed.y);}}},
                    annotation:{annotations:annotations}
                },
                scales:{
                    y:{beginAtZero:false,ticks:{callback:function(v){return fmt(v);}},grid:{color:'#F1F5F9'}},
                    x:{grid:{display:false},ticks:{font:{size:11}}}
                }
            }
        });
        $('chartUpgrade').parentElement.style.height='340px';
    }

    // ─── 이벤트 바인딩 ───
    function bindInputs(prefix, fn){
        document.querySelectorAll('[id^="'+prefix+'"]').forEach(function(el){
            el.addEventListener('input',fn);
        });
    }
    bindInputs('l_',renderLoan);
    bindInputs('r_',renderRepay);
    bindInputs('s_',renderSaving);
    bindInputs('u_',renderUpgrade);

    // ─── 초기 렌더 ───
    renderLoan();
    renderRepay();
    renderSaving();
    renderUpgrade();
})();
</script>
<script src="../nav.js"></script>
<script src="../footer.js"></script>
<script src="../sidebar.js"></script>
</body>
