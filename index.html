<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운영 대시보드 - 우리동네재테크</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: #0F172A; color: #E2E8F0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .hub { max-width: 600px; width: 100%; padding: 40px 20px; text-align: center; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        .subtitle { color: #94A3B8; font-size: 15px; margin-bottom: 48px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .card {
            background: #1E293B; border: 1px solid #334155; border-radius: 12px;
            padding: 28px 20px; text-decoration: none; color: #E2E8F0;
            transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .card:hover { background: #334155; border-color: #60A5FA; transform: translateY(-2px); }
        .card-icon { font-size: 32px; }
        .card-title { font-size: 16px; font-weight: 700; }
        .card-desc { font-size: 13px; color: #94A3B8; }
        .card.disabled { opacity: 0.4; pointer-events: none; }
        @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="hub">
        <h1>운영 대시보드</h1>
        <p class="subtitle">우리동네재테크</p>
        <div class="grid">
            <a href="./consult/" class="card">
                <div class="card-icon">📋</div>
                <div class="card-title">상담 자료</div>
                <div class="card-desc">회원 맞춤 페이지</div>
            </a>
            <a href="./process/" class="card disabled">
                <div class="card-icon">🔄</div>
                <div class="card-title">프로세스</div>
                <div class="card-desc">업무 플로우차트</div>
            </a>
            <a href="./dashboard/" class="card disabled">
                <div class="card-icon">📊</div>
                <div class="card-title">대시보드</div>
                <div class="card-desc">실시간 데이터</div>
            </a>
            <a href="./templates/" class="card disabled">
                <div class="card-icon">📝</div>
                <div class="card-title">템플릿</div>
                <div class="card-desc">양식 모음</div>
            </a>
        </div>
    </div>
</body>
</html>
