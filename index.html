<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <title>운영 대시보드 - 우리동네재테크</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #F8FAFC; color: #1A1A1A; min-height: 100vh; }
        .hub { max-width: 1060px; margin: 0 auto; padding: 32px 20px; padding-right: 190px; }
        .header { margin-bottom: 28px; }
        h1 { font-size: 24px; font-weight: 800; color: #051C2C; margin-bottom: 4px; }
        .subtitle { color: #64748B; font-size: 14px; }
        .section { margin-bottom: 24px; }
        .section-title { font-size: 13px; font-weight: 700; color: #64748B; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .item { background: white; border: 1px solid #E2E8F0; border-radius: 10px; padding: 14px 16px; text-decoration: none; color: #1A1A1A; display: flex; align-items: center; gap: 12px; transition: all 0.15s; }
        .item:hover { border-color: #0077C8; }
        .item-icon { flex-shrink: 0; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
        .item-body { flex: 1; min-width: 0; }
        .item-title { font-size: 14px; font-weight: 700; color: #051C2C; }
        .item-desc { font-size: 12px; color: #94A3B8; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; flex-shrink: 0; }
        .badge-live { background: #E8F3FF; color: #0077C8; }
        .badge-soon { background: #F1F5F9; color: #94A3B8; }
        .arrow { color: #CBD5E1; font-size: 16px; flex-shrink: 0; }

        @media (max-width: 1200px) { .hub { padding-right: 20px; } }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="hub">
        <div class="header">
            <h1>운영 대시보드</h1>
            <p class="subtitle">우리동네재테크</p>
        </div>
        <div id="hub-sections"></div>
    </div>
<script src="./site-config.js"></script>
<script>
(function() {
    var site = window.DASHBOARD_SITE;
    var container = document.getElementById('hub-sections');
    if (!site || !container) {
        return;
    }

    container.innerHTML = site.sections.map(renderSection).join('');

    function renderSection(section) {
        var items = section.items.filter(function(item) { return item.hubVisible; });
        if (!items.length) {
            return '';
        }
        return ''
            + '<div class="section">'
            + '<div class="section-title">' + esc(section.hubTitle) + '</div>'
            + '<div class="grid">' + items.map(renderItem).join('') + '</div>'
            + '</div>';
    }

    function renderItem(item) {
        var icon = site.icons[item.iconKey] || '';
        var badgeClass = item.badgeTone === 'soon' ? 'badge-soon' : 'badge-live';
        return ''
            + '<a href="' + (item.href.indexOf('http') === 0 ? item.href : './' + item.href) + '" class="item">'
            + '<div class="item-icon">' + icon + '</div>'
            + '<div class="item-body">'
            + '<span class="item-title">' + esc(item.title) + '</span>'
            + '<div class="item-desc">' + esc(item.description || '') + '</div>'
            + '</div>'
            + '<span class="badge ' + badgeClass + '">' + esc(item.badgeText || '') + '</span>'
            + '<span class="arrow">›</span>'
            + '</a>';
    }

    function esc(value) {
        var el = document.createElement('span');
        el.textContent = value;
        return el.innerHTML;
    }
})();
</script>
<script src="./nav.js"></script>
<script src="./sidebar.js"></script>
<script src="./footer.js"></script>
</body>
</html>
