<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운영 대시보드 - 우리동네재테크</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: #F8FAFC; color: #1A1A1A; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .hub { max-width: 640px; width: 100%; padding: 48px 20px; text-align: center; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; color: #051C2C; }
        .subtitle { color: #64748B; font-size: 15px; margin-bottom: 48px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .card {
            background: white; border: 2px solid #E2E8F0; border-radius: 14px;
            padding: 28px 20px; text-decoration: none; color: #1A1A1A;
            transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .card:hover { border-color: #0077C8; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,119,200,0.12); }
        .card-icon { font-size: 32px; }
        .card-title { font-size: 16px; font-weight: 700; color: #051C2C; }
        .card-desc { font-size: 13px; color: #94A3B8; }
        .card.disabled { opacity: 0.35; pointer-events: none; }
        @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="hub">
        <h1>운영 대시보드</h1>
        <p class="subtitle">우리동네재테크</p>
        <div class="grid">
            <a href="./consult/" class="card">
                <div class="card-icon">📋</div>
                <div class="card-title">상담 자료</div>
                <div class="card-desc">회원 맞춤 페이지</div>
            </a>
            <a href="./process/" class="card disabled">
                <div class="card-icon">🔄</div>
                <div class="card-title">프로세스</div>
                <div class="card-desc">업무 플로우차트</div>
            </a>
            <a href="./dashboard/" class="card disabled">
                <div class="card-icon">📊</div>
                <div class="card-title">대시보드</div>
                <div class="card-desc">실시간 데이터</div>
            </a>
            <a href="./templates/" class="card disabled">
                <div class="card-icon">📝</div>
                <div class="card-title">템플릿</div>
                <div class="card-desc">양식 모음</div>
            </a>
        </div>
    </div>
</body>
</html>
