<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <title>임시 테스트 - 운영 대시보드</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #F8FAFC; color: #1A1A1A; min-height: 100vh; }
        .wrap { max-width: 860px; margin: 0 auto; padding: 40px 20px 72px; padding-right: 190px; }
        .eyebrow { color: #64748B; font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
        h1 { color: #051C2C; font-size: 28px; line-height: 1.2; margin-bottom: 8px; }
        .lead { color: #64748B; font-size: 14px; line-height: 1.7; margin-bottom: 28px; }
        .panel { background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 10px; padding: 22px; }
        .panel-title { color: #051C2C; font-size: 16px; font-weight: 800; margin-bottom: 8px; }
        .panel-copy { color: #64748B; font-size: 14px; line-height: 1.7; }
        .rule-list { margin-top: 18px; display: grid; gap: 10px; }
        .rule { border: 1px solid #E2E8F0; border-radius: 8px; padding: 12px 14px; background: #F8FAFC; }
        .rule strong { display: block; color: #334155; font-size: 13px; margin-bottom: 2px; }
        .rule span { color: #64748B; font-size: 13px; line-height: 1.5; }
        .empty { margin-top: 20px; border: 1px dashed #CBD5E1; border-radius: 8px; padding: 18px; color: #64748B; font-size: 14px; text-align: center; background: #FFFFFF; }
        @media (max-width: 1200px) { .wrap { padding-right: 20px; } }
    </style>
</head>
<body>
    <main class="wrap">
        <div class="eyebrow">Temporary</div>
        <h1>임시 테스트 보관함</h1>
        <p class="lead">공개 확인이 필요한 임시 테스트 페이지를 모아두는 공간입니다.</p>

        <section class="panel">
            <div class="panel-title">운영 기준</div>
            <p class="panel-copy">테스트용 HTML, 시안, 임시 확인 페이지는 이 경로 아래에 만들고 메인 허브 맨아래에서 찾을 수 있게 연결합니다.</p>
            <div class="rule-list">
                <div class="rule">
                    <strong>올릴 때</strong>
                    <span><code>temp/</code> 아래에 파일을 만들고 <code>site-config.js</code> 임시 테스트 섹션에 연결합니다.</span>
                </div>
                <div class="rule">
                    <strong>끝났을 때</strong>
                    <span>사용하지 않는 임시 파일, 자산, 허브 링크는 정리하고 커밋/푸시합니다.</span>
                </div>
            </div>
        </section>

        <div class="empty">현재 등록된 임시 테스트 페이지는 없습니다.</div>
    </main>
    <script src="../site-config.js"></script>
    <script src="../nav.js"></script>
    <script src="../sidebar.js"></script>
    <script src="../footer.js"></script>
</body>
</html>
